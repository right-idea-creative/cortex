<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Campaign Triage — Córtex OS</title>
<style>
:root {
  --c-bg:#ffffff; --c-surface:#f0f2f5; --c-surface-2:#e9edf3;
  --c-text:#1a1a2e; --c-text-2:#5f6470; --c-text-3:#9099a6;
  --c-border:#e4e6ea; --c-border-2:#d0d3d8;
  --c-danger-bg:#fdecea; --c-danger-tx:#c62828;
  --c-warn-bg:#fff4e0; --c-warn-tx:#a35a00;
  --c-ok-bg:#e8f5e9; --c-ok-tx:#2e7d32; --c-info-tx:#1565c0;
  --c-radius:10px; --c-radius-sm:7px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { margin:0; background:#f0f2f5; color:var(--c-text);
  font-family:var(--font-sans); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }

/* ── Site nav (shared chrome) ── */
/* Nav markup + styles now injected by /cortex-shell.js */
.wrap { max-width:1180px; margin:0 auto; padding:24px 32px 60px; }
header.page { margin-bottom:18px; }
header.page h1 { font-size:22px; font-weight:700; margin:0 0 4px; letter-spacing:-0.01em; color:#0d1b2a; }
header.page .sub { color:var(--c-text-2); font-size:13px; }
header.page .sub b { color:var(--c-text); font-weight:600; }
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:14px; margin:20px 0 22px; }
.card { background:#fff; border-radius:var(--c-radius); padding:16px 18px; box-shadow:0 1px 4px rgba(0,0,0,.07); }
.card .lab { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.6px; color:#9e9e9e; margin-bottom:6px; }
.card .val { font-size:28px; font-weight:700; letter-spacing:-0.01em; color:#0d1b2a; line-height:1.1; }
.card .val.crit { color:var(--c-danger-tx); }
.card .val.risk { color:var(--c-warn-tx); }
.card .val.ok { color:var(--c-ok-tx); }
.card .val.muted { color:var(--c-text-2); }
.controls { display:flex; flex-wrap:wrap; gap:7px; align-items:center; margin-bottom:14px; }
.controls .grp { display:flex; gap:7px; flex-wrap:wrap; }
.controls .spacer { flex:1; }
button.f, select.f { font:inherit; font-size:13px; color:var(--c-text); background:transparent;
  border:1px solid var(--c-border-2); border-radius:var(--c-radius-sm); padding:5px 12px; cursor:pointer; transition:background .12s; }
button.f:hover, select.f:hover { background:var(--c-surface); }
button.f.on { background:var(--c-text); color:var(--c-bg); border-color:var(--c-text); }
input.search { font:inherit; font-size:13px; color:var(--c-text); width:180px; background:var(--c-bg);
  border:1px solid var(--c-border-2); border-radius:var(--c-radius-sm); padding:5px 11px; }
input.search::placeholder { color:var(--c-text-3); }
.tablecard { background:#fff; border:1px solid var(--c-border); border-radius:var(--c-radius); overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.07); }
.scroll { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; min-width:920px; }
thead th { text-align:left; font-weight:500; color:var(--c-text-2); padding:11px 12px;
  border-bottom:1px solid var(--c-border); white-space:nowrap; position:sticky; top:0; background:var(--c-bg); cursor:pointer; user-select:none; }
thead th.r { text-align:right; }
thead th .arr { color:var(--c-text-3); font-size:11px; }
tbody td { padding:10px 12px; border-bottom:1px solid var(--c-border); vertical-align:middle; }
tbody tr:last-child td { border-bottom:0; }
tbody tr { cursor:pointer; transition:background .1s; }
tbody tr:hover { background:var(--c-surface); }
td.r { text-align:right; font-variant-numeric:tabular-nums; }
.acct { font-weight:500; }
.meta { color:var(--c-text-2); font-size:12px; }
.pill { display:inline-block; padding:2px 9px; border-radius:20px; font-size:12px; white-space:nowrap; }
.pill.Critical { background:var(--c-danger-bg); color:var(--c-danger-tx); }
.pill.AtRisk { background:var(--c-warn-bg); color:var(--c-warn-tx); }
.pill.OK { background:var(--c-ok-bg); color:var(--c-ok-tx); }
.pill.LowVolume { background:var(--c-surface-2); color:var(--c-text-2); }
.streak { display:inline-block; padding:2px 8px; border-radius:20px; font-size:12px; background:var(--c-danger-bg); color:var(--c-danger-tx); font-variant-numeric:tabular-nums; }
.dir { font-size:11px; }
.dir.Improving { color:var(--c-ok-tx); }
.dir.Worsening { color:var(--c-danger-tx); }
.dir.Stable { color:var(--c-text-2); }
.dir.New { color:var(--c-text-3); }
.lostis.hi { color:var(--c-danger-tx); }
.spark { vertical-align:middle; }
.muted { color:var(--c-text-3); }
.foot { color:var(--c-text-3); font-size:12px; margin-top:14px; }
.empty { padding:40px; text-align:center; color:var(--c-text-2); }
.retry{font:inherit;font-size:13px;margin-left:8px;padding:3px 10px;border:1px solid var(--c-danger-tx);background:transparent;color:var(--c-danger-tx);border-radius:var(--c-radius-sm);cursor:pointer;}
.retry:hover{background:var(--c-danger-bg);}
.err { padding:30px; border:1px solid var(--c-border); border-radius:var(--c-radius); color:var(--c-danger-tx); background:var(--c-danger-bg); margin-top:16px; }

/* ===== Diagnosis panel ===== */
.panel-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.28); opacity:0; pointer-events:none;
  transition:opacity .2s ease; z-index:140; }
.panel-overlay.open { opacity:1; pointer-events:auto; }
.panel { position:fixed; top:0; right:0; height:100%; width:400px; max-width:92vw;
  background:var(--c-bg); border-left:1px solid var(--c-border); box-shadow:-8px 0 28px rgba(0,0,0,0.12);
  transform:translateX(100%); transition:transform .24s ease; z-index:150; display:flex; flex-direction:column; }
.panel.open { transform:translateX(0); }
.panel-head { padding:16px 18px 14px; border-bottom:1px solid var(--c-border); flex:0 0 auto; }
.panel-head .row { display:flex; align-items:flex-start; gap:10px; }
.panel-head h2 { font-size:16px; font-weight:500; margin:0; letter-spacing:-0.01em; }
.panel-head .psub { color:var(--c-text-2); font-size:12px; margin-top:3px; }
.panel-close { font:inherit; font-size:20px; line-height:1; color:var(--c-text-2); background:transparent;
  border:0; cursor:pointer; padding:0 2px; border-radius:var(--c-radius-sm); }
.panel-close:hover { color:var(--c-text); }
.panel-body { flex:1 1 auto; overflow-y:auto; padding:16px 18px; }
.msg { margin-bottom:14px; }
.msg .who { font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:var(--c-text-3); margin-bottom:4px; }
.msg.user .bubble { background:var(--c-surface-2); border-radius:var(--c-radius-sm); padding:9px 12px; }
.msg.agent .bubble { color:var(--c-text); }
.msg.agent .bubble > *:first-child { margin-top:0; }
.msg.agent .bubble > *:last-child { margin-bottom:0; }
.msg.agent .bubble h1,.msg.agent .bubble h2,.msg.agent .bubble h3 { font-size:14px; font-weight:600; margin:14px 0 6px; }
.msg.agent .bubble p { margin:0 0 9px; }
.msg.agent .bubble ul,.msg.agent .bubble ol { margin:0 0 9px; padding-left:20px; }
.msg.agent .bubble li { margin-bottom:3px; }
.msg.agent .bubble code { font-family:var(--font-mono); font-size:12px; background:var(--c-surface-2);
  padding:1px 5px; border-radius:4px; }
.msg.agent .bubble pre { background:var(--c-surface-2); padding:10px 12px; border-radius:var(--c-radius-sm);
  overflow-x:auto; margin:0 0 9px; }
.msg.agent .bubble pre code { background:transparent; padding:0; }
.msg.agent .bubble a { color:var(--c-info-tx); }
.msg.agent .bubble strong { font-weight:600; }
.typing { display:inline-flex; gap:4px; padding:4px 0; }
.typing span { width:6px; height:6px; border-radius:50%; background:var(--c-text-3); animation:blink 1.2s infinite both; }
.typing span:nth-child(2){ animation-delay:.2s; } .typing span:nth-child(3){ animation-delay:.4s; }
@keyframes blink { 0%,80%,100%{opacity:.2;} 40%{opacity:1;} }
.panel-err { color:var(--c-danger-tx); background:var(--c-danger-bg); border-radius:var(--c-radius-sm);
  padding:9px 12px; font-size:13px; margin-bottom:14px; }
.panel-foot { flex:0 0 auto; border-top:1px solid var(--c-border); padding:12px 14px; background:var(--c-bg); }
.panel-foot .ticket-row { margin-bottom:9px; }
.ticket-btn { font:inherit; font-size:12px; color:var(--c-text); background:transparent;
  border:1px solid var(--c-border-2); border-radius:var(--c-radius-sm); padding:5px 11px; cursor:pointer; transition:background .12s; }
.ticket-btn:hover:not(:disabled) { background:var(--c-surface); }
.ticket-btn:disabled { opacity:.5; cursor:default; }
.ticket-btn.done { color:var(--c-ok-tx); border-color:var(--c-ok-tx); }
.compose { display:flex; gap:8px; align-items:flex-end; }
.compose textarea { font:inherit; font-size:13px; color:var(--c-text); background:var(--c-bg); flex:1;
  border:1px solid var(--c-border-2); border-radius:var(--c-radius-sm); padding:8px 11px; resize:none;
  max-height:120px; line-height:1.4; }
.compose textarea::placeholder { color:var(--c-text-3); }
.send-btn { font:inherit; font-size:13px; color:var(--c-bg); background:var(--c-text); border:1px solid var(--c-text);
  border-radius:var(--c-radius-sm); padding:8px 14px; cursor:pointer; transition:opacity .12s; }
.send-btn:hover:not(:disabled) { opacity:.85; }
.send-btn:disabled { opacity:.4; cursor:default; }
@media (max-width:480px){ .panel { width:100%; max-width:100%; } }

/* ===== Tickets column button ===== */
td.tcell { width:1%; white-space:nowrap; padding-right:4px; }
.tkbtn { font:inherit; font-size:12px; line-height:1; border-radius:var(--c-radius-sm);
  padding:5px 10px; cursor:pointer; transition:background .12s,opacity .12s; white-space:nowrap;
  border:1px solid var(--c-border-2); }
.tkbtn.view { color:var(--c-info-tx); background:transparent; border-color:var(--c-info-tx); font-weight:700; }
.tkbtn.view:hover { background:#eaf2fd; }
.tkbtn.view .cnt { font-weight:700; }
.tkbtn.create { color:var(--c-text); background:transparent; border-color:var(--c-border-2); font-weight:400; }
.tkbtn.create:hover { background:var(--c-surface); }
.tkbtn.loading { color:var(--c-text-3); border-color:var(--c-border); cursor:default; }

/* ===== Tickets drawer (second panel) ===== */
.tk-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.28); opacity:0; pointer-events:none;
  transition:opacity .2s ease; z-index:160; }
.tk-overlay.open { opacity:1; pointer-events:auto; }
.tk-panel { position:fixed; top:0; right:0; height:100%; width:440px; max-width:94vw;
  background:var(--c-bg); border-left:1px solid var(--c-border); box-shadow:-8px 0 28px rgba(0,0,0,0.12);
  transform:translateX(100%); transition:transform .24s ease; z-index:170; display:flex; flex-direction:column; }
.tk-panel.open { transform:translateX(0); }
.tk-head { padding:16px 18px 14px; border-bottom:1px solid var(--c-border); flex:0 0 auto; }
.tk-head .row { display:flex; align-items:flex-start; gap:10px; }
.tk-head h2 { font-size:16px; font-weight:600; margin:0; letter-spacing:-0.01em; }
.tk-head .tsub { color:var(--c-text-2); font-size:12px; margin-top:3px; }
.tk-body { flex:1 1 auto; overflow-y:auto; padding:14px 18px; }
.tk-item { border:1px solid var(--c-border); border-radius:var(--c-radius); padding:11px 13px; margin-bottom:10px;
  text-decoration:none; color:inherit; display:block; transition:background .12s,box-shadow .12s; }
.tk-item:hover { background:var(--c-surface); box-shadow:0 1px 4px rgba(0,0,0,.06); }
.tk-item .tname { font-size:13px; font-weight:600; color:var(--c-text); margin-bottom:5px; line-height:1.35; }
.tk-item .tmeta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:12px; color:var(--c-text-2); }
.tk-status { display:inline-flex; align-items:center; gap:6px; }
.tk-dot { width:9px; height:9px; border-radius:50%; flex:0 0 auto; background:var(--c-text-3); }
.tk-board { color:var(--c-text-3); }
.tk-due { color:var(--c-text-2); }
.tk-sep { color:var(--c-border-2); }
.tk-open { color:var(--c-info-tx); font-size:11px; margin-left:auto; }
.tk-board-group { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--c-text-3);
  margin:14px 0 8px; font-weight:600; }
.tk-board-group:first-child { margin-top:0; }
.tk-empty { padding:30px 10px; text-align:center; color:var(--c-text-2); font-size:13px; }
.tk-loading { padding:30px 10px; text-align:center; color:var(--c-text-3); font-size:13px; }
.tk-err { color:var(--c-danger-tx); background:var(--c-danger-bg); border-radius:var(--c-radius-sm);
  padding:9px 12px; font-size:13px; margin-bottom:12px; }
.tk-boarderr { color:var(--c-warn-tx); background:var(--c-warn-bg); border-radius:var(--c-radius-sm);
  padding:7px 11px; font-size:12px; margin-bottom:10px; }
.tk-foot { flex:0 0 auto; border-top:1px solid var(--c-border); padding:14px; background:var(--c-bg); }
.tk-foot .tklab { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--c-text-3);
  font-weight:600; margin-bottom:9px; }
.tk-bothint { font-size:11px; color:var(--c-text-3); margin-top:7px; line-height:1.4; }
.tk-confirm { color:var(--c-ok-tx); background:var(--c-ok-bg); border-radius:var(--c-radius-sm);
  padding:9px 12px; font-size:13px; margin-bottom:12px; }
@media (max-width:480px){ .tk-panel { width:100%; max-width:100%; } }
</style>
</head>
<body>

<div class="wrap">
  <header class="page">
    <h1>Campaign triage</h1>
    <div class="sub">ODC franchise portfolio · week ending <b id="asof">—</b> · benchmarks are portfolio-wide median CPA per campaign type</div>
  </header>
  <div class="cards" id="cards"></div>
  <div class="controls">
    <div class="grp" id="statusFilters">
      <button class="f on" data-f="flagged">Flagged</button>
      <button class="f" data-f="Critical">Critical</button>
      <button class="f" data-f="At Risk">At Risk</button>
      <button class="f" data-f="chronic">Chronic &ge;4w</button>
      <button class="f" data-f="improving">Improving</button>
      <button class="f" data-f="all">All</button>
    </div>
    <span class="spacer"></span>
    <select class="f" id="typeFilter"><option value="">All types</option></select>
    <span><input class="search" id="q" type="search" placeholder="Search account…" aria-label="Search account"></span>
  </div>
  <div class="tablecard">
    <div class="scroll">
      <table id="tbl">
        <thead><tr>
          <th></th>
          <th data-k="client_name">Account / Type</th>
          <th data-k="cost" class="r">Cost</th>
          <th data-k="conv" class="r">Conv</th>
          <th data-k="cpa" class="r">CPA</th>
          <th data-k="bench" class="r">Bench</th>
          <th data-k="budget_lost_is" class="r">Lost IS</th>
          <th data-k="calls" class="r">Calls</th>
          <th data-k="cpa_trend">CPA trend (9wk)</th>
          <th data-k="streak" class="r">Streak</th>
          <th data-k="status">Status</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="foot" id="foot"></div>
</div>

<!-- Diagnosis panel -->
<div class="panel-overlay" id="panelOverlay"></div>
<aside class="panel" id="panel" aria-hidden="true">
  <div class="panel-head">
    <div class="row">
      <div style="flex:1;min-width:0;">
        <h2 id="panelTitle">—</h2>
        <div class="psub" id="panelSub">—</div>
      </div>
      <button class="panel-close" id="panelClose" aria-label="Close panel">&times;</button>
    </div>
  </div>
  <div class="panel-body" id="panelBody"></div>
  <div class="panel-foot">
    <div class="ticket-row">
      <button class="ticket-btn" id="ticketBtn">＋ Create Monday ticket</button>
    </div>
    <div class="compose">
      <textarea id="composeInput" rows="1" placeholder="Ask a follow-up…" aria-label="Follow-up message"></textarea>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>
</aside>

<!-- Tickets drawer -->
<div class="tk-overlay" id="tkOverlay"></div>
<aside class="tk-panel" id="tkPanel" aria-hidden="true">
  <div class="tk-head">
    <div class="row">
      <div style="flex:1;min-width:0;">
        <h2 id="tkTitle">—</h2>
        <div class="tsub" id="tkSub">—</div>
      </div>
      <button class="panel-close" id="tkClose" aria-label="Close tickets">&times;</button>
    </div>
  </div>
  <div class="tk-body" id="tkBody"></div>
  <div class="tk-foot">
    <div class="tklab">Create a ticket</div>
    <div class="tk-bothint">Use the Córtex ticket bot in the bottom-left corner to open a new ticket.</div>
  </div>
</aside>

<script>
// ==========================================================
//  PASTE YOUR n8n WEBHOOK URL HERE  (between the quotes)
//  e.g. "https://your-instance.app.n8n.cloud/webhook/triage-agent"
// ==========================================================
const WEBHOOK_URL = "https://naterimc.app.n8n.cloud/webhook/098cd887-6614-4f2f-8095-30d956a0ccc9";
// ==========================================================
//  Monday ticket proxy (Cloudflare Pages Function).
//  GET "<base>?clientId=ITEM_ID" -> open tickets for one client.
//  Each triage row carries its own mondayClientId (stamped at build time
//  by joining the master board on Google Ads CID — see monday_client_ids.py),
//  so the browser passes the exact ID and does no name matching.
//  If served from the same Cloudflare Pages project as the proxy, leave this
//  relative. Otherwise use the full URL, e.g.
//  "https://cortex-cmv.pages.dev/monday-proxy".
// ==========================================================
const MONDAY_PROXY_URL = "/monday-proxy";
// ==========================================================

const STATE={data:null,filter:"flagged",type:"",q:"",sortK:null,sortDir:1};
const fmtMoney=n=>(n==null)?"—":"$"+Math.round(n).toLocaleString();
const fmtCpa=n=>(n==null||n<0)?"—":"$"+Math.round(n);
const fmtPct=n=>(n==null)?"—":Math.round(n*100)+"%";
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function sparkline(hist,dir){
  const vals=hist.filter(v=>v>0);
  if(!vals.length) return '<span class="muted">no conv</span>';
  const max=Math.max(...vals),min=Math.min(...vals),W=80,H=20,n=hist.length,step=W/Math.max(1,n-1);
  let dots="",pts=[];
  hist.forEach((v,i)=>{const x=Math.round(i*step);
    if(v<0){dots+=`<circle cx="${x}" cy="${H-2}" r="1.4" fill="var(--c-text-3)"/>`;pts.push(null);}
    else{const y=Math.round(H-2-((v-min)/((max-min)||1))*(H-4));pts.push([x,y]);}});
  let d="",started=false;
  pts.forEach(p=>{if(p){d+=(started?"L":"M")+p[0]+" "+p[1]+" ";started=true;}});
  const seen=pts.filter(Boolean),last=seen[seen.length-1];
  const color=dir==="Improving"?"var(--c-ok-tx)":dir==="Worsening"?"var(--c-danger-tx)":"var(--c-text-2)";
  const lastDot=last?`<circle cx="${last[0]}" cy="${last[1]}" r="2" fill="${color}"/>`:"";
  return `<svg class="spark" width="${W}" height="${H}" style="color:${color}">${dots}<path d="${d}" fill="none" stroke="${color}" stroke-width="1.5"/>${lastDot}</svg>`;
}
function dirLabel(d){
  const map={Improving:"impr",Worsening:"wors",Stable:"stable"};
  const cls=d==="Improving"?"Improving":d==="Worsening"?"Worsening":d==="Stable"?"Stable":"New";
  return `<span class="dir ${cls}">${map[d]||"new"}</span>`;
}
function passesFilter(r){
  const f=STATE.filter;
  if(f==="flagged"&&!(r.status==="Critical"||r.status==="At Risk"))return false;
  if(f==="Critical"&&r.status!=="Critical")return false;
  if(f==="At Risk"&&r.status!=="At Risk")return false;
  if(f==="chronic"&&!(r.streak>=4))return false;
  if(f==="improving"&&r.dir!=="Improving")return false;
  if(STATE.type&&r.biz_type!==STATE.type)return false;
  if(STATE.q&&!r.client_name.toLowerCase().includes(STATE.q.toLowerCase()))return false;
  return true;
}
function sortRows(rows){
  if(!STATE.sortK){
    const order={Critical:1,"At Risk":2,OK:3,"Low Volume":4};
    return rows.sort((a,b)=>(order[a.status]-order[b.status])||(b.streak-a.streak)||(b.cost-a.cost));
  }
  const k=STATE.sortK,dir=STATE.sortDir;
  return rows.sort((a,b)=>{
    let av,bv;
    if(k==="calls"){av=a.account_calls_7d??-1;bv=b.account_calls_7d??-1;}
    else if(k==="cpa_trend"){av=a.dir;bv=b.dir;}
    else{av=a[k];bv=b[k];}
    if(av==null)av=-Infinity;if(bv==null)bv=-Infinity;
    if(typeof av==="string")return dir*av.localeCompare(bv);
    return dir*(av-bv);
  });
}
function render(){

    const lostHi=r.budget_lost_is!=null&&r.budget_lost_is>=0.3?"hi":"";
    const streakTxt=r.streak>=4?`<span class="streak">${r.streak}w</span>`:(r.streak>0?`${r.streak}w`:'<span class="muted">—</span>');
    const pillCls="pill "+r.status.replace(/ /g,"");
    return `<tr data-i="${i}">
      <td class="tcell"><button class="tkbtn loading" data-tk="${i}">…</button></td>
      <td><div class="acct">${esc(r.client_name)}</div><div class="meta">${esc(r.biz_type)} · ${esc(r.tier||"")}</div></td>
      <td class="r">${fmtMoney(r.cost)}</td>
      <td class="r">${r.conv}</td>
      <td class="r">${fmtCpa(r.cpa)}</td>
      <td class="r muted">${fmtCpa(r.bench)}</td>
      <td class="r lostis ${lostHi}">${fmtPct(r.budget_lost_is)}</td>
      <td class="r">${callsTxt}</td>
      <td>${sparkline(r.cpa_history,r.dir)} ${dirLabel(r.dir)}</td>
      <td class="r">${streakTxt}</td>
      <td><span class="${pillCls}">${r.status}</span></td>
    </tr>`;
  }).join("");
  [...tb.querySelectorAll("tr[data-i]")].forEach(tr=>{
    tr.onclick=(e)=>{
      if(e.target.closest(".tcell"))return; // ticket button handles its own click
      openPanel(rows[+tr.dataset.i]);
    };
  });
  [...tb.querySelectorAll(".tkbtn[data-tk]")].forEach(btn=>{
    const row=rows[+btn.dataset.tk];
    hydrateTicketBtn(btn,row);
    btn.onclick=(e)=>{e.stopPropagation();openTickets(row);};
  });
  document.getElementById("foot").textContent=`Showing ${rows.length} of ${d.items.length} campaigns · click a row to open the diagnosis panel · sparkline = weekly CPA oldest→newest, dot = no conversions`;
}

/* ============ Minimal markdown renderer (no dependencies) ============ */
/* Supports: headers, bold, italic, inline code, fenced code, links,
   unordered + ordered lists, paragraphs. Escapes HTML first. */
function inlineMd(t){
  t=esc(t);
  t=t.replace(/`([^`]+)`/g,(_,c)=>`<code>${c}</code>`);
  t=t.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  t=t.replace(/__([^_]+)__/g,"<strong>$1</strong>");
  t=t.replace(/(^|[^*])\*([^*\n]+)\*/g,"$1<em>$2</em>");
  t=t.replace(/(^|[^_])_([^_\n]+)_/g,"$1<em>$2</em>");
  t=t.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  return t;
}
function renderMarkdown(src){
  src=String(src==null?"":src).replace(/\r\n/g,"\n");
  const lines=src.split("\n");
  let html="",i=0,inFence=false,fenceBuf=[];
  let listType=null,listBuf=[];
  function closeList(){
    if(listType){html+=`<${listType}>`+listBuf.map(li=>`<li>${inlineMd(li)}</li>`).join("")+`</${listType}>`;listType=null;listBuf=[];}
  }
  while(i<lines.length){
    let ln=lines[i];
    const fence=ln.match(/^```/);
    if(fence){
      if(!inFence){inFence=true;fenceBuf=[];}
      else{inFence=false;html+=`<pre><code>${esc(fenceBuf.join("\n"))}</code></pre>`;}
      i++;continue;
    }
    if(inFence){fenceBuf.push(ln);i++;continue;}
    const h=ln.match(/^(#{1,3})\s+(.*)$/);
    if(h){closeList();html+=`<h${h[1].length}>${inlineMd(h[2])}</h${h[1].length}>`;i++;continue;}
    const ul=ln.match(/^\s*[-*+]\s+(.*)$/);
    const ol=ln.match(/^\s*\d+[.)]\s+(.*)$/);
    if(ul){if(listType&&listType!=="ul")closeList();listType="ul";listBuf.push(ul[1]);i++;continue;}
    if(ol){if(listType&&listType!=="ol")closeList();listType="ol";listBuf.push(ol[1]);i++;continue;}
    if(ln.trim()===""){closeList();i++;continue;}
    closeList();
    let para=[ln];i++;
    while(i<lines.length && lines[i].trim()!=="" && !lines[i].match(/^(#{1,3})\s/) &&
          !lines[i].match(/^\s*[-*+]\s/) && !lines[i].match(/^\s*\d+[.)]\s/) && !lines[i].match(/^```/)){
      para.push(lines[i]);i++;
    }
    html+=`<p>${inlineMd(para.join(" "))}</p>`;
  }
  closeList();
  if(inFence){html+=`<pre><code>${esc(fenceBuf.join("\n"))}</code></pre>`;}
  return html;
}

/* ============ Monday tickets module ============ */
/* Per-client ticket state, keyed by each row's mondayClientId.
   That ID is stamped onto triage_data.json at build time by joining the
   Monday master board on Google Ads Customer ID (see monday_client_ids.py).
   The browser does no name matching — it passes the exact ID to the proxy. */
const TICKETS={
  byClient:{},      // mondayClientId -> {state,clientId,clientName,data,err,promise}
  current:null      // mondayClientId of the open drawer
};

/* fetch (and cache) open tickets for a client, deduped by mondayClientId */
function fetchClientTickets(clientId){
  const key=String(clientId);
  const cached=TICKETS.byClient[key];
  if(cached&&(cached.state==="ready"||cached.state==="loading"))return cached.promise||Promise.resolve(cached);
  const entry={state:"loading",clientId:key,clientName:null,data:null,err:null};
  TICKETS.byClient[key]=entry;
  entry.promise=fetch(MONDAY_PROXY_URL+"?clientId="+encodeURIComponent(key),{cache:"no-store"})
    .then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(j=>{entry.state="ready";entry.data=j;entry.clientName=j&&j.clientName;return entry;})
    .catch(e=>{entry.state="error";entry.err=e.message;return entry;});
  return entry.promise;
}

function ticketCount(entry){
  return (entry&&entry.data&&Array.isArray(entry.data.tickets))?entry.data.tickets.length:0;
}

/* paint a row's ticket button based on its client's loaded state */
function paintTicketBtn(btn,entry){
  btn.classList.remove("loading","view","create");
  if(!entry||entry.state==="loading"){btn.classList.add("loading");btn.textContent="…";return;}
  if(entry.state==="error"){btn.classList.add("create");btn.textContent="Create Ticket";btn.title=entry.err||"";return;}
  const n=ticketCount(entry);
  if(n>0){btn.classList.add("view");btn.innerHTML=`View Active Tickets <span class="cnt">(${n})</span>`;}
  else{btn.classList.add("create");btn.textContent="Create Ticket";}
}

function hydrateTicketBtn(btn,row){
  const id=row.mondayClientId;
  if(!id){ // no Monday ID stamped for this franchise — let them create, but flag it
    btn.classList.remove("loading","view");
    btn.classList.add("create");btn.textContent="Create Ticket";
    btn.title="No Monday client ID on this row — check the master board join.";
    return;
  }
  const key=String(id);
  const cached=TICKETS.byClient[key];
  if(cached&&(cached.state==="ready"||cached.state==="error")){paintTicketBtn(btn,cached);return;}
  paintTicketBtn(btn,{state:"loading"});
  fetchClientTickets(id).then(entry=>{
    const rows=window.__triageRows||[];
    [...document.querySelectorAll(".tkbtn[data-tk]")].forEach(b=>{
      const r=rows[+b.dataset.tk];
      if(r&&String(r.mondayClientId)===key)paintTicketBtn(b,entry);
    });
  });
}

/* ============ Tickets drawer ============ */
function openTickets(row){
  const id=row.mondayClientId;
  TICKETS.current=id?String(id):null;
  document.getElementById("tkTitle").textContent=row.client_name;
  document.getElementById("tkSub").textContent="Open tickets across Monday boards";
  document.getElementById("tkPanel").classList.add("open");
  document.getElementById("tkPanel").setAttribute("aria-hidden","false");
  document.getElementById("tkOverlay").classList.add("open");
  renderTicketsBody(row);
}
function closeTickets(){
  document.getElementById("tkPanel").classList.remove("open");
  document.getElementById("tkPanel").setAttribute("aria-hidden","true");
  document.getElementById("tkOverlay").classList.remove("open");
  TICKETS.current=null;
}
function renderTicketsBody(row){
  const body=document.getElementById("tkBody");
  const id=row.mondayClientId;
  if(!id){
    body.innerHTML=`<div class="tk-err">No Monday client ID for “${esc(row.client_name)}”. Check the master-board join in monday_client_ids.py.</div>
      <div class="tk-empty">You can still create a ticket below.</div>`;
    return;
  }
  const key=String(id);
  const entry=TICKETS.byClient[key];
  if(!entry||entry.state==="loading"){
    body.innerHTML=`<div class="tk-loading">Loading tickets…</div>`;
    fetchClientTickets(id).then(()=>{if(TICKETS.current===key)renderTicketsBody(row);});
    return;
  }
  if(entry.state==="error"){
    body.innerHTML=`<div class="tk-err">${esc(entry.err||"Couldn't load tickets.")}</div>
      <div class="tk-empty">No open tickets to show. You can create one below.</div>`;
    return;
  }
  const d=entry.data||{};
  const tickets=Array.isArray(d.tickets)?d.tickets:[];
  let html="";
  if(Array.isArray(d.boardErrors)){
    d.boardErrors.forEach(be=>{html+=`<div class="tk-boarderr">⚠ ${esc(be.board||"A board")} couldn't be loaded${be.error?": "+esc(be.error):""}.</div>`;});
  }
  if(!tickets.length){
    html+=`<div class="tk-empty">No open tickets for this client.<br>Create one below.</div>`;
    body.innerHTML=html;return;
  }
  const groups={};
  tickets.forEach(t=>{(groups[t.board||"Other"]=groups[t.board||"Other"]||[]).push(t);});
  Object.keys(groups).forEach(boardName=>{
    html+=`<div class="tk-board-group">${esc(boardName)}</div>`;
    groups[boardName].forEach(t=>{
      const color=t.statusColor||"var(--c-text-3)";
      const due=t.dueDate?`<span class="tk-due">Due ${esc(t.dueDate)}</span>`:"";
      const sep=due?`<span class="tk-sep">·</span>`:"";
      const href=t.url||("https://monday.com/boards/"+(t.boardId||"")+"/pulses/"+(t.id||""));
      html+=`<a class="tk-item" href="${esc(href)}" target="_blank" rel="noopener">
        <div class="tname">${esc(t.name||"Untitled ticket")}</div>
        <div class="tmeta">
          <span class="tk-status"><span class="tk-dot" style="background:${esc(color)}"></span>${esc(t.status||"—")}</span>
          ${sep}${due}
          <span class="tk-open">Open in Monday ↗</span>
        </div>
      </a>`;
    });
  });
  body.innerHTML=html;
}

function refreshAllTicketBtns(){
  const rows=window.__triageRows||[];
  [...document.querySelectorAll(".tkbtn[data-tk]")].forEach(b=>{
    const row=rows[+b.dataset.tk];if(!row||!row.mondayClientId)return;
    const entry=TICKETS.byClient[String(row.mondayClientId)];
    if(entry)paintTicketBtn(b,entry);
  });
}
function wireTickets(){
  document.getElementById("tkClose").onclick=closeTickets;
  document.getElementById("tkOverlay").onclick=closeTickets;
  document.addEventListener("keydown",e=>{
    if(e.key==="Escape"&&document.getElementById("tkPanel").classList.contains("open"))closeTickets();
  });
}

/* ============ Diagnosis panel logic ============ */
const PANEL={row:null,sessionId:null,busy:false,lastUserMessage:null};
const $body=()=>document.getElementById("panelBody");

function openPanel(r){
  PANEL.row=r;
  PANEL.sessionId=`${r.client_name}-${Date.now()}`;
  PANEL.busy=false;
  PANEL.lastUserMessage="Start the diagnosis.";
  document.getElementById("panelTitle").textContent=r.client_name;
  document.getElementById("panelSub").textContent=`${r.biz_type} · ${r.status} · CPA ${fmtCpa(r.cpa)} vs ${fmtCpa(r.bench)} bench`;
  $body().innerHTML="";
  resetTicketBtn();
  document.getElementById("composeInput").value="";
  document.getElementById("panel").classList.add("open");
  document.getElementById("panel").setAttribute("aria-hidden","false");
  document.getElementById("panelOverlay").classList.add("open");
  // initial diagnosis (per spec: not echoed as a user bubble)
  sendToAgent("Start the diagnosis.",{showUser:false});
}
function closePanel(){
  document.getElementById("panel").classList.remove("open");
  document.getElementById("panel").setAttribute("aria-hidden","true");
  document.getElementById("panelOverlay").classList.remove("open");
  PANEL.row=null;PANEL.sessionId=null;PANEL.busy=false;PANEL.lastUserMessage=null;
  $body().innerHTML="";
}
function addMsg(who,text,isMarkdown){
  const div=document.createElement("div");
  div.className="msg "+who;
  const label=who==="user"?"You":"Agent";
  const inner=isMarkdown?renderMarkdown(text):esc(text);
  div.innerHTML=`<div class="who">${label}</div><div class="bubble">${inner}</div>`;
  $body().appendChild(div);
  $body().scrollTop=$body().scrollHeight;
  return div;
}
function addTyping(){
  const div=document.createElement("div");
  div.className="msg agent";div.id="typingMsg";
  div.innerHTML=`<div class="who">Agent</div><div class="bubble"><span class="typing"><span></span><span></span><span></span></span></div>`;
  $body().appendChild(div);
  $body().scrollTop=$body().scrollHeight;
  return div;
}
function removeTyping(){const t=document.getElementById("typingMsg");if(t)t.remove();}
function addErr(text){
  const div=document.createElement("div");
  div.className="panel-err";div.textContent=text;
  $body().appendChild(div);
  $body().scrollTop=$body().scrollHeight;
}
function setBusy(b){
  PANEL.busy=b;
  document.getElementById("sendBtn").disabled=b;
  document.getElementById("composeInput").disabled=b;
  document.getElementById("ticketBtn").disabled=b;
}
function resetTicketBtn(){
  const t=document.getElementById("ticketBtn");
  t.textContent="＋ Create Monday ticket";t.classList.remove("done");t.disabled=false;
}

async function sendToAgent(message,opts){
  opts=opts||{};
  if(PANEL.busy)return;
  const r=PANEL.row;if(!r)return;
  if(opts.showUser!==false) addMsg("user",message,false);
  if(message && !opts.isTicket) PANEL.lastUserMessage=message;
  setBusy(true);
  addTyping();
  const payload={
    sessionId:PANEL.sessionId,
    customer_id:r.customer_id,
    client_name:r.client_name,
    message:message
  };
  if(opts.isTicket) payload.createTicket=true;
  try{
    if(!WEBHOOK_URL) throw new Error("WEBHOOK_URL is not set in triage.html");
    const res=await fetch(WEBHOOK_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
    if(!res.ok)throw new Error("HTTP "+res.status);
    const data=await res.json();
    removeTyping();
    const text=(data&&typeof data.response==="string")?data.response:JSON.stringify(data);
    addMsg("agent",text,true);
  }catch(e){
    removeTyping();
    addErr("Couldn't reach the diagnosis agent ("+e.message+").");
    throw e;
  }finally{
    setBusy(false);
    if(document.getElementById("panel").classList.contains("open"))
      document.getElementById("composeInput").focus();
  }
}

function wirePanel(){
  document.getElementById("panelClose").onclick=closePanel;
  document.getElementById("panelOverlay").onclick=closePanel;
  document.addEventListener("keydown",e=>{
    if(e.key==="Escape"&&document.getElementById("panel").classList.contains("open"))closePanel();
  });
  const input=document.getElementById("composeInput");
  function autoGrow(){input.style.height="auto";input.style.height=Math.min(input.scrollHeight,120)+"px";}
  input.addEventListener("input",autoGrow);
  function doSend(){
    const v=input.value.trim();
    if(!v||PANEL.busy)return;
    input.value="";autoGrow();
    sendToAgent(v,{}).catch(()=>{});
  }
  document.getElementById("sendBtn").onclick=doSend;
  input.addEventListener("keydown",e=>{
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doSend();}
  });
  document.getElementById("ticketBtn").onclick=()=>{
    if(PANEL.busy||!PANEL.row)return;
    const t=document.getElementById("ticketBtn");
    sendToAgent(PANEL.lastUserMessage||"Create a Monday ticket for this account.",{isTicket:true,showUser:false})
      .then(()=>{t.textContent="✓ Ticket requested";t.classList.add("done");t.disabled=true;})
      .catch(()=>{/* error already shown; leave button enabled to retry */});
  };
}

function boot(d){STATE.data=d;populateTypes();wire();wirePanel();wireTickets();render();}
fetch("https://naterimc.app.n8n.cloud/webhook/odc-triage-data",{cache:"no-store"})
  .then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(boot)
  .catch(e=>{
    document.querySelector(".wrap").insertAdjacentHTML("beforeend",
      `<div class="err">Couldn't load live triage data (${esc(e.message)}). <button class="retry" onclick="location.reload()">Retry</button></div>`);
  });
</script>
