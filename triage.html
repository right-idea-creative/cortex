<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Campaign Triage — Cortex</title>
<style>
:root {
  --c-bg:#ffffff; --c-surface:#f7f7f4; --c-surface-2:#f1efe8;
  --c-text:#1d1c1a; --c-text-2:#5f5e5a; --c-text-3:#8a8980;
  --c-border:rgba(0,0,0,0.10); --c-border-2:rgba(0,0,0,0.18);
  --c-danger-bg:#fceaea; --c-danger-tx:#a32d2d;
  --c-warn-bg:#faeeda; --c-warn-tx:#854f0b;
  --c-ok-bg:#eaf3de; --c-ok-tx:#3b6d11; --c-info-tx:#185fa5;
  --c-radius:10px; --c-radius-sm:7px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --c-bg:#1a1a18; --c-surface:#242421; --c-surface-2:#2c2c2a;
    --c-text:#f1efe8; --c-text-2:#b4b2a9; --c-text-3:#888780;
    --c-border:rgba(255,255,255,0.12); --c-border-2:rgba(255,255,255,0.22);
    --c-danger-bg:#3a1c1c; --c-danger-tx:#f09595;
    --c-warn-bg:#3a2c12; --c-warn-tx:#f5c97a;
    --c-ok-bg:#20300f; --c-ok-tx:#b6d97f; --c-info-tx:#85b7eb;
  }
}
* { box-sizing:border-box; }
body { margin:0; background:var(--c-bg); color:var(--c-text);
  font-family:var(--font-sans); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }
.wrap { max-width:1180px; margin:0 auto; padding:28px 22px 60px; }
header.page { margin-bottom:22px; }
header.page h1 { font-size:22px; font-weight:500; margin:0 0 4px; letter-spacing:-0.01em; }
header.page .sub { color:var(--c-text-2); font-size:13px; }
header.page .sub b { color:var(--c-text); font-weight:500; }
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin:20px 0 22px; }
.card { background:var(--c-surface); border-radius:var(--c-radius-sm); padding:13px 15px; }
.card .lab { font-size:12px; color:var(--c-text-2); margin-bottom:3px; }
.card .val { font-size:23px; font-weight:500; letter-spacing:-0.01em; }
.card .val.crit { color:var(--c-danger-tx); }
.card .val.risk { color:var(--c-warn-tx); }
.card .val.ok { color:var(--c-ok-tx); }
.card .val.muted { color:var(--c-text-2); }
.controls { display:flex; flex-wrap:wrap; gap:7px; align-items:center; margin-bottom:14px; }
.controls .grp { display:flex; gap:7px; flex-wrap:wrap; }
.controls .spacer { flex:1; }
button.f, select.f { font:inherit; font-size:13px; color:var(--c-text); background:transparent;
  border:1px solid var(--c-border-2); border-radius:var(--c-radius-sm); padding:5px 12px; cursor:pointer; transition:background .12s; }
button.f:hover, select.f:hover { background:var(--c-surface); }
button.f.on { background:var(--c-text); color:var(--c-bg); border-color:var(--c-text); }
input.search { font:inherit; font-size:13px; color:var(--c-text); width:180px; background:var(--c-bg);
  border:1px solid var(--c-border-2); border-radius:var(--c-radius-sm); padding:5px 11px; }
input.search::placeholder { color:var(--c-text-3); }
.tablecard { background:var(--c-bg); border:1px solid var(--c-border); border-radius:var(--c-radius); overflow:hidden; }
.scroll { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; min-width:920px; }
thead th { text-align:left; font-weight:500; color:var(--c-text-2); padding:11px 12px;
  border-bottom:1px solid var(--c-border); white-space:nowrap; position:sticky; top:0; background:var(--c-bg); cursor:pointer; user-select:none; }
thead th.r { text-align:right; }
thead th .arr { color:var(--c-text-3); font-size:11px; }
tbody td { padding:10px 12px; border-bottom:1px solid var(--c-border); vertical-align:middle; }
tbody tr:last-child td { border-bottom:0; }
tbody tr { cursor:pointer; transition:background .1s; }
tbody tr:hover { background:var(--c-surface); }
td.r { text-align:right; font-variant-numeric:tabular-nums; }
.acct { font-weight:500; }
.meta { color:var(--c-text-2); font-size:12px; }
.pill { display:inline-block; padding:2px 9px; border-radius:20px; font-size:12px; white-space:nowrap; }
.pill.Critical { background:var(--c-danger-bg); color:var(--c-danger-tx); }
.pill.AtRisk { background:var(--c-warn-bg); color:var(--c-warn-tx); }
.pill.OK { background:var(--c-ok-bg); color:var(--c-ok-tx); }
.pill.LowVolume { background:var(--c-surface-2); color:var(--c-text-2); }
.streak { display:inline-block; padding:2px 8px; border-radius:20px; font-size:12px; background:var(--c-danger-bg); color:var(--c-danger-tx); font-variant-numeric:tabular-nums; }
.dir { font-size:11px; }
.dir.Improving { color:var(--c-ok-tx); }
.dir.Worsening { color:var(--c-danger-tx); }
.dir.Stable { color:var(--c-text-2); }
.dir.New { color:var(--c-text-3); }
.lostis.hi { color:var(--c-danger-tx); }
.spark { vertical-align:middle; }
.muted { color:var(--c-text-3); }
.foot { color:var(--c-text-3); font-size:12px; margin-top:14px; }
.empty { padding:40px; text-align:center; color:var(--c-text-2); }
.err { padding:30px; border:1px solid var(--c-border); border-radius:var(--c-radius); color:var(--c-danger-tx); background:var(--c-danger-bg); margin-top:16px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="page">
    <h1>Campaign triage</h1>
    <div class="sub">ODC franchise portfolio · week ending <b id="asof">—</b> · benchmarks are portfolio-wide median CPA per campaign type</div>
  </header>
  <div class="cards" id="cards"></div>
  <div class="controls">
    <div class="grp" id="statusFilters">
      <button class="f on" data-f="flagged">Flagged</button>
      <button class="f" data-f="Critical">Critical</button>
      <button class="f" data-f="At Risk">At Risk</button>
      <button class="f" data-f="chronic">Chronic &ge;4w</button>
      <button class="f" data-f="improving">Improving</button>
      <button class="f" data-f="all">All</button>
    </div>
    <span class="spacer"></span>
    <select class="f" id="typeFilter"><option value="">All types</option></select>
    <span><input class="search" id="q" type="search" placeholder="Search account…" aria-label="Search account"></span>
  </div>
  <div class="tablecard">
    <div class="scroll">
      <table id="tbl">
        <thead><tr>
          <th data-k="client_name">Account / Type</th>
          <th data-k="cost" class="r">Cost</th>
          <th data-k="conv" class="r">Conv</th>
          <th data-k="cpa" class="r">CPA</th>
          <th data-k="bench" class="r">Bench</th>
          <th data-k="budget_lost_is" class="r">Lost IS</th>
          <th data-k="calls" class="r">Calls</th>
          <th data-k="cpa_trend">CPA trend (9wk)</th>
          <th data-k="streak" class="r">Streak</th>
          <th data-k="status">Status</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="foot" id="foot"></div>
</div>
<script>
const STATE={data:null,filter:"flagged",type:"",q:"",sortK:null,sortDir:1};
const fmtMoney=n=>(n==null)?"—":"$"+Math.round(n).toLocaleString();
const fmtCpa=n=>(n==null||n<0)?"—":"$"+Math.round(n);
const fmtPct=n=>(n==null)?"—":Math.round(n*100)+"%";
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function sparkline(hist,dir){
  const vals=hist.filter(v=>v>0);
  if(!vals.length) return '<span class="muted">no conv</span>';
  const max=Math.max(...vals),min=Math.min(...vals),W=80,H=20,n=hist.length,step=W/Math.max(1,n-1);
  let dots="",pts=[];
  hist.forEach((v,i)=>{const x=Math.round(i*step);
    if(v<0){dots+=`<circle cx="${x}" cy="${H-2}" r="1.4" fill="var(--c-text-3)"/>`;pts.push(null);}
    else{const y=Math.round(H-2-((v-min)/((max-min)||1))*(H-4));pts.push([x,y]);}});
  let d="",started=false;
  pts.forEach(p=>{if(p){d+=(started?"L":"M")+p[0]+" "+p[1]+" ";started=true;}});
  const seen=pts.filter(Boolean),last=seen[seen.length-1];
  const color=dir==="Improving"?"var(--c-ok-tx)":dir==="Worsening"?"var(--c-danger-tx)":"var(--c-text-2)";
  const lastDot=last?`<circle cx="${last[0]}" cy="${last[1]}" r="2" fill="${color}"/>`:"";
  return `<svg class="spark" width="${W}" height="${H}" style="color:${color}">${dots}<path d="${d}" fill="none" stroke="${color}" stroke-width="1.5"/>${lastDot}</svg>`;
}
function dirLabel(d){
  const map={Improving:"impr",Worsening:"wors",Stable:"stable"};
  const cls=d==="Improving"?"Improving":d==="Worsening"?"Worsening":d==="Stable"?"Stable":"New";
  return `<span class="dir ${cls}">${map[d]||"new"}</span>`;
}
function passesFilter(r){
  const f=STATE.filter;
  if(f==="flagged"&&!(r.status==="Critical"||r.status==="At Risk"))return false;
  if(f==="Critical"&&r.status!=="Critical")return false;
  if(f==="At Risk"&&r.status!=="At Risk")return false;
  if(f==="chronic"&&!(r.streak>=4))return false;
  if(f==="improving"&&r.dir!=="Improving")return false;
  if(STATE.type&&r.biz_type!==STATE.type)return false;
  if(STATE.q&&!r.client_name.toLowerCase().includes(STATE.q.toLowerCase()))return false;
  return true;
}
function sortRows(rows){
  if(!STATE.sortK){
    const order={Critical:1,"At Risk":2,OK:3,"Low Volume":4};
    return rows.sort((a,b)=>(order[a.status]-order[b.status])||(b.streak-a.streak)||(b.cost-a.cost));
  }
  const k=STATE.sortK,dir=STATE.sortDir;
  return rows.sort((a,b)=>{
    let av,bv;
    if(k==="calls"){av=a.account_calls_7d??-1;bv=b.account_calls_7d??-1;}
    else if(k==="cpa_trend"){av=a.dir;bv=b.dir;}
    else{av=a[k];bv=b[k];}
    if(av==null)av=-Infinity;if(bv==null)bv=-Infinity;
    if(typeof av==="string")return dir*av.localeCompare(bv);
    return dir*(av-bv);
  });
}
function render(){
  const d=STATE.data;
  document.getElementById("asof").textContent=d.summary.snapshot_date;
  const s=d.summary;
  document.getElementById("cards").innerHTML=[
    ["Critical",s.critical,"crit"],["At Risk",s.at_risk,"risk"],
    ["Low Volume",s.low_volume,"muted"],["OK",s.ok,"ok"],
    ["Total spend (7d)",fmtMoney(s.total_cost_7d),""]
  ].map(([lab,val,cls])=>`<div class="card"><div class="lab">${lab}</div><div class="val ${cls}">${val}</div></div>`).join("");
  let rows=d.items.filter(passesFilter);
  rows=sortRows(rows.slice());
  const tb=document.getElementById("tbody");
  if(!rows.length){tb.innerHTML=`<tr><td colspan="10" class="empty">No campaigns match this view.</td></tr>`;}
  else tb.innerHTML=rows.map((r,i)=>{
    const callsTxt=r.account_calls_7d==null?'<span class="muted">—</span>':r.account_calls_7d+(r.account_missed_7d?` <span class="muted">(${r.account_missed_7d} miss)</span>`:"");
    const lostHi=r.budget_lost_is!=null&&r.budget_lost_is>=0.3?"hi":"";
    const streakTxt=r.streak>=4?`<span class="streak">${r.streak}w</span>`:(r.streak>0?`${r.streak}w`:'<span class="muted">—</span>');
    const pillCls="pill "+r.status.replace(/ /g,"");
    return `<tr data-i="${i}">
      <td><div class="acct">${esc(r.client_name)}</div><div class="meta">${esc(r.biz_type)} · ${esc(r.tier||"")}</div></td>
      <td class="r">${fmtMoney(r.cost)}</td>
      <td class="r">${r.conv}</td>
      <td class="r">${fmtCpa(r.cpa)}</td>
      <td class="r muted">${fmtCpa(r.bench)}</td>
      <td class="r lostis ${lostHi}">${fmtPct(r.budget_lost_is)}</td>
      <td class="r">${callsTxt}</td>
      <td>${sparkline(r.cpa_history,r.dir)} ${dirLabel(r.dir)}</td>
      <td class="r">${streakTxt}</td>
      <td><span class="${pillCls}">${r.status}</span></td>
    </tr>`;
  }).join("");
  [...tb.querySelectorAll("tr[data-i]")].forEach(tr=>{
    tr.onclick=()=>{
      const r=rows[+tr.dataset.i];
      const prompt=`Diagnose the ${r.client_name} ${r.biz_type} campaign — flagged ${r.status} (${r.reason}), CPA ${fmtCpa(r.cpa)} vs ${fmtCpa(r.bench)} benchmark, ${fmtPct(r.budget_lost_is)} budget-lost IS, trend ${r.dir}, ${r.streak}-week streak. What's the likely cause and fix?`;
      if(typeof window.sendPrompt==="function")window.sendPrompt(prompt);
      else{navigator.clipboard&&navigator.clipboard.writeText(prompt);tr.style.background="var(--c-surface-2)";setTimeout(()=>tr.style.background="",400);}
    };
  });
  document.getElementById("foot").textContent=`Showing ${rows.length} of ${d.items.length} campaigns · click a row to copy a diagnosis prompt · sparkline = weekly CPA oldest→newest, dot = no conversions`;
}
function wire(){
  document.querySelectorAll("#statusFilters .f").forEach(b=>{
    b.onclick=()=>{STATE.filter=b.dataset.f;
      document.querySelectorAll("#statusFilters .f").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");render();};
  });
  document.getElementById("typeFilter").onchange=e=>{STATE.type=e.target.value;render();};
  document.getElementById("q").oninput=e=>{STATE.q=e.target.value;render();};
  document.querySelectorAll("thead th").forEach(th=>{
    th.onclick=()=>{
      const k=th.dataset.k;
      if(STATE.sortK===k)STATE.sortDir*=-1;else{STATE.sortK=k;STATE.sortDir=1;}
      document.querySelectorAll("thead th .arr").forEach(a=>a.remove());
      const span=document.createElement("span");span.className="arr";span.textContent=STATE.sortDir>0?" ▲":" ▼";
      th.appendChild(span);render();
    };
  });
}
function populateTypes(){
  const types=[...new Set(STATE.data.items.map(r=>r.biz_type))].sort();
  const sel=document.getElementById("typeFilter");
  types.forEach(t=>{const o=document.createElement("option");o.value=t;o.textContent=t;sel.appendChild(o);});
}
fetch("./triage_data.json",{cache:"no-store"})
  .then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(d=>{STATE.data=d;populateTypes();wire();render();})
  .catch(e=>{document.querySelector(".wrap").insertAdjacentHTML("beforeend",
    `<div class="err">Couldn't load triage_data.json (${esc(e.message)}). Make sure it sits next to triage.html in the repo root.</div>`);});
</script>
</body>
</html>
