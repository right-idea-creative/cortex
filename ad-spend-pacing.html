<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ad Spend Pacing</title>
<style>
  :root{
    --bg:#ffffff; --bg2:#f6f5f1; --bg3:#efeee8; --text:#1f1e1c; --muted:#6b6a64; --hint:#9a9890;
    --border:#e4e2da; --border2:#cfccc2;
    --ok-bg:#e1f5ee; --ok-tx:#0f6e56; --ok-bd:#9cd9c4;
    --warn-bg:#faeeda; --warn-tx:#854f0b; --warn-bd:#e9c98f;
    --dang-bg:#fcebeb; --dang-tx:#a32d2d; --dang-bd:#e7a9a9;
    --idle-bg:#f0efea; --idle-tx:#9a9890; --idle-bd:#e0ded6;
    --info:#185fa5;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);background:var(--bg);font-size:15px;line-height:1.5;}
  .page{max-width:1200px;margin:0 auto;padding:24px 20px 80px;}
  h1{font-size:22px;font-weight:600;margin:0 0 4px;}
  h2{font-size:18px;font-weight:600;margin:0 0 4px;}
  h3{font-size:14px;font-weight:600;margin:22px 0 8px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);}
  .sub{font-size:13px;color:var(--hint);margin:0;}
  .bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:16px 0;}
  .bar label{font-size:13px;color:var(--muted);}
  select{font:inherit;padding:6px 10px;border:1px solid var(--border2);border-radius:8px;background:var(--bg);}
  .filters{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin:16px 0;padding:14px 16px;background:var(--bg2);border-radius:10px;}
  .filters .fg{display:flex;flex-direction:column;gap:4px;}
  .filters .fg span{font-size:12px;color:var(--muted);}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:16px 0;}
  .card{background:var(--bg2);border-radius:8px;padding:14px 16px;}
  .card .lbl{font-size:13px;color:var(--muted);margin:0 0 4px;}
  .card .val{font-size:23px;font-weight:600;margin:0;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
  th{color:var(--muted);font-weight:600;}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;}
  tr.clk:hover{background:var(--bg2);cursor:pointer;}
  .pill{font-size:12px;padding:3px 9px;border-radius:8px;font-weight:600;display:inline-block;white-space:nowrap;}
  .p-ok{background:var(--ok-bg);color:var(--ok-tx);} .p-warn{background:var(--warn-bg);color:var(--warn-tx);} .p-dang{background:var(--dang-bg);color:var(--dang-tx);}
  /* channel chips */
  .chips{display:flex;gap:5px;flex-wrap:wrap;}
  .chip{font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px;border:1px solid;white-space:nowrap;}
  .c-ok{background:var(--ok-bg);color:var(--ok-tx);border-color:var(--ok-bd);}
  .c-warn{background:var(--warn-bg);color:var(--warn-tx);border-color:var(--warn-bd);}
  .c-dang{background:var(--dang-bg);color:var(--dang-tx);border-color:var(--dang-bd);}
  .c-idle{background:var(--idle-bg);color:var(--idle-tx);border-color:var(--idle-bd);}
  .back{font-size:13px;color:var(--info);cursor:pointer;display:inline-block;margin-bottom:8px;}
  .tablewrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:6px;}
  .tablewrap table th,.tablewrap table td{padding:9px 12px;}
  .tablewrap table tr:last-child td{border-bottom:none;}
  .agentbtn{font:inherit;font-size:12px;padding:5px 10px;border:1px solid var(--border2);border-radius:8px;background:var(--bg);cursor:pointer;white-space:nowrap;}
  .agentbtn:hover{background:var(--bg2);}
  .state{padding:40px 16px;text-align:center;color:var(--muted);}
  .state .big{font-size:16px;color:var(--text);margin-bottom:6px;}
  .state code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:12px;}
  .retry{margin-top:14px;font:inherit;padding:8px 16px;border:1px solid var(--border2);border-radius:8px;background:var(--bg);cursor:pointer;}
  .spinner{width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--info);border-radius:50%;
    animation:spin .8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .muted-row td{color:var(--hint);}
  .note{font-size:12px;color:var(--hint);margin:6px 0 0;}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin:10px 0 0;}
  .legend .chip{cursor:default;}
  /* chat drawer */
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;z-index:50;}
  .drawer-overlay.open{display:block;}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(440px,100%);background:var(--bg);
    border-left:1px solid var(--border2);display:flex;flex-direction:column;transform:translateX(100%);
    transition:transform .18s ease;z-index:51;}
  .drawer.open{transform:translateX(0);}
  .drawer-head{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .drawer-head .x{cursor:pointer;color:var(--muted);font-size:20px;line-height:1;border:none;background:none;}
  .chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
  .msg{padding:9px 12px;border-radius:12px;max-width:85%;font-size:14px;white-space:pre-wrap;word-wrap:break-word;}
  .msg.user{align-self:flex-end;background:var(--info);color:#fff;border-bottom-right-radius:4px;}
  .msg.bot{align-self:flex-start;background:var(--bg2);border-bottom-left-radius:4px;}
  .msg.err{align-self:flex-start;background:var(--dang-bg);color:var(--dang-tx);}
  .typing{align-self:flex-start;color:var(--hint);font-size:13px;font-style:italic;}
  .chat-in{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;}
  .chat-in textarea{flex:1;font:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--border2);border-radius:8px;resize:none;height:40px;max-height:120px;}
  .chat-in button{font:inherit;padding:0 14px;border:none;border-radius:8px;background:var(--info);color:#fff;cursor:pointer;}
  .chat-in button:disabled{opacity:.5;cursor:default;}
  .suggest{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 12px;}
  .suggest button{font:inherit;font-size:12px;padding:5px 9px;border:1px solid var(--border2);border-radius:14px;background:var(--bg);cursor:pointer;}
  .suggest button:hover{background:var(--bg2);}
</style>
</head>
<body>
<div class="page">
  <h1>Ad Spend Pacing</h1>
  <p class="sub">Monthly pacing by client and channel. Click a client for detail, or open the agent for analysis.</p>

  <div class="bar">
    <label>Current month</label>
    <select id="asof"></select>
  </div>

  <div id="view"><div class="state"><div class="spinner"></div>Loading live data&hellip;</div></div>
</div>

<div class="drawer-overlay" id="overlay"></div>
<aside class="drawer" id="drawer" aria-label="Client agent chat">
  <div class="drawer-head">
    <div><strong id="drawer-title">Agent</strong><div class="sub" id="drawer-sub"></div></div>
    <button class="x" id="drawer-x" aria-label="Close">&times;</button>
  </div>
  <div class="chat" id="chat"></div>
  <div class="suggest" id="suggest"></div>
  <div class="chat-in">
    <textarea id="chat-input" placeholder="Ask about this client&hellip;"></textarea>
    <button id="chat-send">Send</button>
  </div>
</aside>

<script>
/* =====================================================================
   N8N WIRING — the two webhook URLs the page calls.
   ---------------------------------------------------------------------
   DATA_WEBHOOK_URL : n8n Webhook that runs `SELECT * FROM pacing_api`.
     Returns rows (bare array or {rows|data:[...]}). Each row now carries:
       client, channel, year, month, committed, actual,
       account_manager, source_group, spent_mtd,
       days_in_month, days_elapsed, days_remaining, current_month
     Channels expected: google_ads, lsa, bing, meta, nextdoor, yelp
     GET, CORS enabled.
   AGENT_WEBHOOK_URL : POST endpoint for the per-client AI chat (unchanged contract).
   ===================================================================== */
const DATA_WEBHOOK_URL  = "https://naterimc.app.n8n.cloud/webhook/odc-pacing-data";
const AGENT_WEBHOOK_URL = "https://naterimc.app.n8n.cloud/webhook/odc-pacing-agent";

/* Status band: on track within +/-8%. Year-correction trigger at +/-5%. */
const OK_LOW = 0.92, OK_HIGH = 1.08;
const YEAR_TRIGGER = 0.05;

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const CH_ORDER = ["google_ads","lsa","bing","meta","nextdoor","yelp"];
const CH_LABEL = {google_ads:"Google Ads", lsa:"LSA", bing:"Bing", meta:"Meta", nextdoor:"Nextdoor", yelp:"Yelp"};
const fmt = n => (n<0?"-$":"$") + Math.abs(Math.round(n)).toLocaleString();
const fmt2 = n => (n<0?"-$":"$") + Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});
const pct = n => (n*100).toFixed(0) + "%";

let ROWS = [];
let ASOF = (new Date()).getMonth() + 1;
let DIMS = { days_in_month:30, days_elapsed:1, days_remaining:29, current_month:ASOF };
let FILTERS = { source:"all", status:"all", am:"all" };

const view = document.getElementById('view');
const asofSel = document.getElementById('asof');

function buildMonthSelect(){
  asofSel.innerHTML='';
  MONTHS.forEach((m,i)=>{ const o=document.createElement('option'); o.value=i+1; o.textContent=m; if(i+1===ASOF)o.selected=true; asofSel.appendChild(o); });
  asofSel.onchange=()=>{ ASOF=+asofSel.value; renderOverview(); };
}

/* ---------- live data load ---------- */
function showState(html){ view.innerHTML='<div class="state">'+html+'</div>'; }

async function loadData(){
  showState('<div class="spinner"></div>Loading live data&hellip;');
  if(!DATA_WEBHOOK_URL || DATA_WEBHOOK_URL.indexOf('PASTE_')===0){
    showState('<div class="big">Data source not configured</div>Set <code>DATA_WEBHOOK_URL</code> at the top of this file to your n8n endpoint that returns <code>SELECT * FROM pacing_api</code>.');
    return;
  }
  try{
    const res = await fetch(DATA_WEBHOOK_URL, {method:'GET'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    const rows = Array.isArray(data) ? data : (data.rows || data.data || []);
    if(!Array.isArray(rows) || rows.length===0) throw new Error('endpoint returned no rows');
    ROWS = rows.map(r=>({
      client:String(r.client), channel:String(r.channel),
      year:+r.year, month:+r.month,
      committed:+r.committed||0, actual:+r.actual||0,
      account_manager:r.account_manager?String(r.account_manager):'(Unassigned)',
      source_group:r.source_group?String(r.source_group):'Other',
      spent_mtd:+r.spent_mtd||0,
      days_in_month:+r.days_in_month||30,
      days_elapsed:+r.days_elapsed||1,
      days_remaining:+r.days_remaining||29,
      current_month:+r.current_month||ASOF
    }));
    const any = ROWS[0];
    DIMS = { days_in_month:any.days_in_month, days_elapsed:any.days_elapsed, days_remaining:any.days_remaining, current_month:any.current_month };
    buildMonthSelect();
    renderOverview();
  }catch(err){
    showState('<div class="big">Could not load data</div>'+err.message+
      '<br><button class="retry" onclick="loadData()">Retry</button>');
  }
}

/* ---------- derivations ---------- */
function clients(){ return [...new Set(ROWS.map(r=>r.client))].sort(); }
function rowsFor(client){ return ROWS.filter(r=>r.client===client); }
function amFor(client){ const r=rowsFor(client)[0]; return r?r.account_manager:'(Unassigned)'; }
function sourceFor(client){ const r=rowsFor(client)[0]; return r?r.source_group:'Other'; }

function statusOf(pacingPct, committed, actual){
  if(committed<=0 && actual<=0) return 'idle';
  if(committed<=0 && actual>0) return 'dang';        // spending with no budget
  if(pacingPct>OK_HIGH) return 'dang';
  if(pacingPct<OK_LOW) return 'warn';
  return 'ok';
}
function statusLabel(s){ return s==='ok'?'On track':s==='warn'?'Underspending':s==='dang'?'Overspending':'No activity'; }
function pillClass(s){ return s==='ok'?'p-ok':s==='warn'?'p-warn':'p-dang'; }

function monthPacing(client,m){
  let c=0,a=0; for(const r of rowsFor(client)) if(r.month===m){ c+=r.committed; a+=r.actual; }
  return { committed:c, actual:a, variance:a-c, pct:c?a/c:0 };
}
function channelRows(client,m){
  const map={};
  for(const ch of CH_ORDER) map[ch]={channel:ch,committed:0,actual:0,spent_mtd:0};
  for(const r of rowsFor(client)) if(r.month===m){
    if(!map[r.channel]) map[r.channel]={channel:r.channel,committed:0,actual:0,spent_mtd:0};
    map[r.channel].committed+=r.committed; map[r.channel].actual+=r.actual; map[r.channel].spent_mtd+=r.spent_mtd;
  }
  return CH_ORDER.filter(ch=>map[ch]).map(ch=>{
    const o=map[ch]; o.variance=o.actual-o.committed; o.pct=o.committed?o.actual/o.committed:0;
    o.status=statusOf(o.pct,o.committed,o.actual); return o;
  });
}
function yearPacing(client,asof){
  let full=0,cytd=0,sytd=0,monthsLeft=0;
  for(const r of rowsFor(client)){
    full+=r.committed;
    if(r.month<=asof){ cytd+=r.committed; sytd+=r.actual; }
  }
  monthsLeft = Math.max(0, 12 - asof);
  const ytdVar = sytd - cytd;            // +over, -under for the year so far
  const ytdPct = cytd? sytd/cytd : 0;
  return { full, committedYTD:cytd, spentYTD:sytd, ytdVar, ytdPct, remaining:full-sytd, monthsLeft };
}
/* Catch-up: spread the YTD gap across remaining months (incl. current).
   Negative ytdVar (under) -> positive catch-up (add this month).
   Positive ytdVar (over)  -> negative catch-up (pull back this month). */
function catchupForMonth(client,asof){
  const y=yearPacing(client,asof);
  const spread = (y.monthsLeft+1)>0 ? (-y.ytdVar)/(y.monthsLeft+1) : 0;
  return spread; // dollars to add(+)/subtract(-) on top of this month's original allocation
}
/* Recommended daily budget for the CURRENT month only (catch-up aware):
   (correctionTarget - spent_mtd) / days_remaining  */
function dailyRec(committed, spentMtd, catchup){
  const target = committed + catchup;
  const left = Math.max(0, target - spentMtd);
  const dr = Math.max(1, DIMS.days_remaining);
  return left / dr;
}

/* ---------- filters ---------- */
function passesFilter(client){
  if(FILTERS.source!=='all'){
    const sg=sourceFor(client);
    if(FILTERS.source==='odc' && sg!=='ODC') return false;
    if(FILTERS.source==='other' && sg==='ODC') return false;
  }
  if(FILTERS.am!=='all' && amFor(client)!==FILTERS.am) return false;
  if(FILTERS.status!=='all'){
    const m=monthPacing(client,ASOF); const s=statusOf(m.pct,m.committed,m.actual);
    if(FILTERS.status==='over' && s!=='dang') return false;
    if(FILTERS.status==='under' && s!=='warn') return false;
    if(FILTERS.status==='ontrack' && s!=='ok') return false;
  }
  return true;
}
function allAMs(){ return [...new Set(ROWS.map(r=>r.account_manager))].sort(); }

function card(l,v,sub){ return '<div class="card"><p class="lbl">'+l+'</p><p class="val">'+v+'</p>'+(sub?'<p class="sub">'+sub+'</p>':'')+'</div>'; }
function chip(ch){
  const cls = ch.status==='idle'?'c-idle':ch.status==='ok'?'c-ok':ch.status==='warn'?'c-warn':'c-dang';
  return '<span class="chip '+cls+'">'+(CH_LABEL[ch.channel]||ch.channel)+'</span>';
}

/* ---------- overview ---------- */
function renderFiltersBar(){
  const ams=allAMs().map(a=>'<option value="'+a.replace(/"/g,'&quot;')+'"'+(FILTERS.am===a?' selected':'')+'>'+a+'</option>').join('');
  return '<div class="filters">'
    + '<div class="fg"><span>Client type</span><select id="f-source">'
      + '<option value="all"'+(FILTERS.source==='all'?' selected':'')+'>All</option>'
      + '<option value="odc"'+(FILTERS.source==='odc'?' selected':'')+'>ODC</option>'
      + '<option value="other"'+(FILTERS.source==='other'?' selected':'')+'>Non-ODC</option>'
    + '</select></div>'
    + '<div class="fg"><span>Pacing</span><select id="f-status">'
      + '<option value="all"'+(FILTERS.status==='all'?' selected':'')+'>All</option>'
      + '<option value="over"'+(FILTERS.status==='over'?' selected':'')+'>Overspending</option>'
      + '<option value="ontrack"'+(FILTERS.status==='ontrack'?' selected':'')+'>On track</option>'
      + '<option value="under"'+(FILTERS.status==='under'?' selected':'')+'>Underspending</option>'
    + '</select></div>'
    + '<div class="fg"><span>Account manager</span><select id="f-am">'
      + '<option value="all"'+(FILTERS.am==='all'?' selected':'')+'>All</option>'+ams
    + '</select></div>'
    + '</div>';
}
function wireFilters(){
  const s=document.getElementById('f-source'), st=document.getElementById('f-status'), am=document.getElementById('f-am');
  if(s) s.onchange=()=>{FILTERS.source=s.value;renderOverview();};
  if(st) st.onchange=()=>{FILTERS.status=st.value;renderOverview();};
  if(am) am.onchange=()=>{FILTERS.am=am.value;renderOverview();};
}

function renderOverview(){
  const cs=clients().filter(passesFilter);
  let tc=0,ta=0; const rows=cs.map(c=>{ const m=monthPacing(c,ASOF); tc+=m.committed; ta+=m.actual; return {c,m}; });
  const onTrack=rows.filter(r=>{const s=statusOf(r.m.pct,r.m.committed,r.m.actual);return s==='ok';}).length;

  let h=renderFiltersBar();
  h+='<div class="cards">';
  h+=card(MONTHS[ASOF-1]+" committed", fmt(tc));
  h+=card(MONTHS[ASOF-1]+" actual", fmt(ta));
  h+=card("On track this month", onTrack+" / "+cs.length);
  h+=card("Month variance", (ta-tc>=0?'+':'')+fmt(ta-tc));
  h+='</div>';

  h+='<div class="tablewrap"><table><thead><tr>'
    +'<th>Client</th><th>Channels</th><th class="num">Committed</th><th class="num">Actual</th>'
    +'<th class="num">Variance</th><th class="num">Pacing</th><th class="num">Rec. $/day</th><th>Status</th><th></th>'
    +'</tr></thead><tbody>';
  for(const {c,m} of rows){
    const chans=channelRows(c,ASOF);
    const chips=chans.map(chip).join(' ');
    const s=statusOf(m.pct,m.committed,m.actual);
    const col=Math.abs(m.variance)<1?'':(m.variance>0?'color:var(--dang-tx)':'color:var(--warn-tx)');
    // client-level recommended daily (only meaningful for current month)
    let rec='&mdash;';
    if(ASOF===DIMS.current_month){
      const cu=catchupForMonth(c,ASOF);
      let smtd=0; for(const r of rowsFor(c)) if(r.month===ASOF) smtd+=r.spent_mtd;
      rec=fmt(dailyRec(m.committed, smtd, cu));
    }
    h+='<tr class="clk" data-c="'+encodeURIComponent(c)+'">'
      +'<td><strong>'+c+'</strong><div class="sub">'+amFor(c)+'</div></td>'
      +'<td><div class="chips">'+chips+'</div></td>'
      +'<td class="num">'+fmt(m.committed)+'</td>'
      +'<td class="num">'+fmt(m.actual)+'</td>'
      +'<td class="num" style="'+col+'">'+(m.variance>=0?'+':'')+fmt(m.variance)+'</td>'
      +'<td class="num">'+(m.committed?pct(m.pct):'&mdash;')+'</td>'
      +'<td class="num">'+rec+'</td>'
      +'<td><span class="pill '+pillClass(s)+'">'+statusLabel(s)+'</span></td>'
      +'<td><button class="agentbtn" data-agent="'+encodeURIComponent(c)+'">Agent</button></td></tr>';
  }
  h+='</tbody></table></div>';
  h+='<div class="legend"><span class="chip c-ok">On track</span><span class="chip c-warn">Underspending</span>'
    +'<span class="chip c-dang">Overspending / spend w/ no budget</span><span class="chip c-idle">No budget &amp; no spend</span></div>';
  h+='<p class="note">Channel chips are colored by that channel\u2019s own pacing; the Status column is the whole client. '
    +'Rec. $/day is catch-up aware (uses month-to-date spend, days remaining, and the year correction).</p>';

  view.innerHTML=h;
  wireFilters();
  view.querySelectorAll('tr.clk').forEach(tr=> tr.onclick=(e)=>{ if(e.target.classList.contains('agentbtn'))return; renderClient(decodeURIComponent(tr.dataset.c)); });
  view.querySelectorAll('button[data-agent]').forEach(b=> b.onclick=(e)=>{ e.stopPropagation(); openAgent(decodeURIComponent(b.dataset.agent)); });
}

/* ---------- client detail ---------- */
function renderClient(client){
  const m=monthPacing(client,ASOF), y=yearPacing(client,ASOF), chans=channelRows(client,ASOF);
  const isCur = (ASOF===DIMS.current_month);
  const cu = catchupForMonth(client,ASOF);
  const s=statusOf(m.pct,m.committed,m.actual);

  let h='<span class="back" id="back">&larr; All clients</span>';
  h+='<h2>'+client+' &mdash; '+MONTHS[ASOF-1]+' <span class="pill '+pillClass(s)+'">'+statusLabel(s)+'</span> '
    +'<button class="agentbtn" id="client-agent">Agent</button></h2>';
  h+='<p class="sub">'+sourceFor(client)+' &middot; AM: '+amFor(client)+'</p>';

  /* TABLE 1 — This month, clean: are we pacing OK this month? */
  h+='<h3>This month &mdash; pacing by channel</h3>';
  h+='<div class="tablewrap"><table><thead><tr>'
    +'<th>Channel</th><th class="num">Committed</th><th class="num">Actual</th>'
    +'<th class="num">Variance</th><th class="num">Pacing</th>'
    + (isCur?'<th class="num">Spent MTD</th><th class="num">Rec. $/day</th>':'')
    +'<th>Status</th></tr></thead><tbody>';
  for(const r of chans){
    const idle=(r.committed<=0&&r.actual<=0);
    const col=Math.abs(r.variance)<1?'':(r.variance>0?'color:var(--dang-tx)':'color:var(--warn-tx)');
    let rec='&mdash;';
    if(isCur && !idle){ rec=fmt(dailyRec(r.committed, r.spent_mtd, /*channel share of catchup*/ shareCatchup(cu, chans, r))); }
    h+='<tr'+(idle?' class="muted-row"':'')+'>'
      +'<td><strong>'+(CH_LABEL[r.channel]||r.channel)+'</strong></td>'
      +'<td class="num">'+fmt(r.committed)+'</td>'
      +'<td class="num">'+fmt(r.actual)+'</td>'
      +'<td class="num" style="'+col+'">'+(idle?'&mdash;':(r.variance>=0?'+':'')+fmt(r.variance))+'</td>'
      +'<td class="num">'+(r.committed?pct(r.pct):(idle?'&mdash;':'no budget'))+'</td>'
      + (isCur?('<td class="num">'+(idle?'&mdash;':fmt(r.spent_mtd))+'</td><td class="num">'+rec+'</td>'):'')
      +'<td>'+(idle?'<span class="chip c-idle">No activity</span>':'<span class="chip '+chipCls(r.status)+'">'+statusLabel(r.status)+'</span>')+'</td>'
      +'</tr>';
  }
  // totals row
  const totalRec = isCur? fmt(dailyRec(m.committed, sumMtd(client), cu)) : '&mdash;';
  h+='<tr><td><strong>Total</strong></td><td class="num"><strong>'+fmt(m.committed)+'</strong></td>'
    +'<td class="num"><strong>'+fmt(m.actual)+'</strong></td>'
    +'<td class="num"><strong>'+(m.variance>=0?'+':'')+fmt(m.variance)+'</strong></td>'
    +'<td class="num"><strong>'+(m.committed?pct(m.pct):'&mdash;')+'</strong></td>'
    + (isCur?('<td class="num"><strong>'+fmt(sumMtd(client))+'</strong></td><td class="num"><strong>'+totalRec+'</strong></td>'):'')
    +'<td></td></tr>';
  h+='</tbody></table></div>';

  /* TABLE 2 — Correction breakout: original vs catch-up portion of this month's target */
  if(isCur){
    const adjusted = m.committed + cu;
    h+='<h3>This month\u2019s budget: original vs catch-up</h3>';
    h+='<div class="tablewrap"><table><tbody>';
    h+='<tr><td>Originally allocated (this month)</td><td class="num">'+fmt(m.committed)+'</td></tr>';
    h+='<tr><td>Catch-up adjustment '+(cu>=0?'(add, year is behind)':'(pull back, year is ahead)')+'</td>'
      +'<td class="num" style="'+(Math.abs(cu)<1?'':(cu>0?'color:var(--warn-tx)':'color:var(--dang-tx)'))+'">'+(cu>=0?'+':'')+fmt(cu)+'</td></tr>';
    h+='<tr><td><strong>Correction-adjusted target</strong></td><td class="num"><strong>'+fmt(adjusted)+'</strong></td></tr>';
    h+='<tr><td>Spent so far this month (MTD)</td><td class="num">'+fmt(sumMtd(client))+'</td></tr>';
    h+='</tbody></table></div>';
    h+='<p class="note">Commitment is never edited \u2014 the catch-up figure is derived from where the year sits, spread across the remaining months. AMs will be able to override corrections on a separate tool.</p>';
  }

  /* TABLE 3 — Year context: full year, to-date, how we're pacing for the year, remaining pool */
  const corr = y.ytdPct>(1+YEAR_TRIGGER)?'over':(y.ytdPct<(1-YEAR_TRIGGER)?'under':'on');
  const banner = corr==='over'?'<span class="pill p-dang">Over for the year &mdash; correction mode</span>'
    :corr==='under'?'<span class="pill p-warn">Under for the year &mdash; pool to redeploy</span>'
    :'<span class="pill p-ok">On track for the year</span>';
  h+='<h3>Year context (as of '+MONTHS[ASOF-1]+')</h3>';
  h+='<div class="tablewrap"><table><tbody>';
  h+='<tr><td>Full-year committed</td><td class="num">'+fmt(y.full)+'</td></tr>';
  h+='<tr><td>Committed to date</td><td class="num">'+fmt(y.committedYTD)+'</td></tr>';
  h+='<tr><td>Spent to date</td><td class="num">'+fmt(y.spentYTD)+'</td></tr>';
  h+='<tr><td>Year-to-date pacing</td><td class="num">'+(y.committedYTD?pct(y.ytdPct):'&mdash;')+'</td></tr>';
  h+='<tr><td>Year-to-date variance</td><td class="num" style="'+(Math.abs(y.ytdVar)<1?'':(y.ytdVar>0?'color:var(--dang-tx)':'color:var(--warn-tx)'))+'">'+(y.ytdVar>=0?'+':'')+fmt(y.ytdVar)+'</td></tr>';
  h+='<tr><td><strong>Remaining pool</strong></td><td class="num"><strong>'+fmt(y.remaining)+'</strong></td></tr>';
  h+='</tbody></table></div>';
  h+='<p class="note">'+banner+'</p>';

  view.innerHTML=h;
  document.getElementById('back').onclick=renderOverview;
  document.getElementById('client-agent').onclick=()=>openAgent(client);
}
function chipCls(s){ return s==='ok'?'c-ok':s==='warn'?'c-warn':s==='dang'?'c-dang':'c-idle'; }
function sumMtd(client){ let s=0; for(const r of rowsFor(client)) if(r.month===ASOF) s+=r.spent_mtd; return s; }
/* split the client-level catch-up across channels proportional to committed (so per-channel rec sums sensibly) */
function shareCatchup(totalCatchup, chans, row){
  const totCommit = chans.reduce((a,c)=>a+(c.committed>0?c.committed:0),0);
  if(totCommit<=0) return 0;
  return totalCatchup * ((row.committed>0?row.committed:0)/totCommit);
}

/* ---------- AI agent chat drawer ---------- */
const overlay=document.getElementById('overlay'), drawer=document.getElementById('drawer');
const chatEl=document.getElementById('chat'), inputEl=document.getElementById('chat-input'), sendBtn=document.getElementById('chat-send');
const suggestEl=document.getElementById('suggest');
let AGENT_CLIENT=null, history=[];

function buildContext(client){
  const m=monthPacing(client,ASOF), y=yearPacing(client,ASOF), chans=channelRows(client,ASOF);
  return {
    committed_month:Math.round(m.committed), actual_month:Math.round(m.actual),
    variance_month:Math.round(m.variance), pacing_pct_month:+m.pct.toFixed(3),
    channels:chans.map(r=>({channel:r.channel,committed:Math.round(r.committed),actual:Math.round(r.actual),variance:Math.round(r.variance)})),
    year:{committed_to_date:Math.round(y.committedYTD),spent_to_date:Math.round(y.spentYTD),
      ytd_variance:Math.round(y.ytdVar),full_year_committed:Math.round(y.full),remaining_pool:Math.round(y.remaining)}
  };
}
function addMsg(text,cls){ const d=document.createElement('div'); d.className='msg '+cls; d.textContent=text; chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight; return d; }
function openAgent(client){
  AGENT_CLIENT=client; history=[];
  document.getElementById('drawer-title').textContent=client;
  const m=monthPacing(client,ASOF);
  document.getElementById('drawer-sub').textContent=MONTHS[ASOF-1]+' pacing '+(m.committed?pct(m.pct):'\u2014')+' \u00b7 variance '+(m.variance>=0?'+':'')+fmt(m.variance);
  chatEl.innerHTML='';
  addMsg('Ask me about '+client+'\u2019s pacing, channel mix, or what to do with the variance.','bot');
  suggestEl.innerHTML='';
  ['Why are we off this month?','What should we do with the variance?','Which channel is driving the gap?'].forEach(q=>{
    const b=document.createElement('button'); b.textContent=q; b.onclick=()=>{ inputEl.value=q; send(); }; suggestEl.appendChild(b);
  });
  overlay.classList.add('open'); drawer.classList.add('open'); inputEl.focus();
}
function closeAgent(){ overlay.classList.remove('open'); drawer.classList.remove('open'); }
overlay.onclick=closeAgent; document.getElementById('drawer-x').onclick=closeAgent;

async function send(){
  const text=inputEl.value.trim(); if(!text||!AGENT_CLIENT) return;
  addMsg(text,'user'); history.push({role:'user',content:text});
  inputEl.value=''; sendBtn.disabled=true;
  const typing=addMsg('Thinking\u2026','typing');
  if(!AGENT_WEBHOOK_URL || AGENT_WEBHOOK_URL.indexOf('PASTE_')===0){
    typing.remove(); addMsg('Agent webhook not configured yet.','err'); sendBtn.disabled=false; return;
  }
  try{
    const res=await fetch(AGENT_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ client:AGENT_CLIENT, message:text, month:ASOF, month_name:MONTHS[ASOF-1], history:history, context:buildContext(AGENT_CLIENT) })});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    const reply=data.reply||data.text||data.output||(typeof data==='string'?data:JSON.stringify(data));
    typing.remove(); addMsg(reply,'bot'); history.push({role:'assistant',content:reply});
  }catch(err){ typing.remove(); addMsg('Could not reach the agent: '+err.message,'err'); }
  sendBtn.disabled=false;
}
sendBtn.onclick=send;
inputEl.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });

/* boot */
loadData();
</script>
