<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Strategy · Córtex</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1d212a;
    --border: #2a2f3a;
    --border-strong: #3a4150;
    --text: #e6e8ec;
    --text-dim: #9aa1ad;
    --text-faint: #6b7280;
    --accent: #4f9cf9;
    --accent-dim: #1e3a5f;
    --green: #3ecf8e;
    --green-bg: #15281f;
    --amber: #e0a000;
    --amber-bg: #2a2310;
    --radius: 8px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 24px 20px 80px; }

  /* ---- header ---- */
  .page-head { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 4px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .subtitle { color: var(--text-dim); font-size: 14px; margin: 0 0 20px; }

  /* ---- toolbar ---- */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    padding: 12px 14px; margin-bottom: 22px;
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
  }
  .toolbar-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .toolbar label { font-size: 13px; color: var(--text-dim); }
  select, input, textarea {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border-strong); border-radius: 6px;
    padding: 6px 9px; font-family: var(--font); font-size: 14px;
  }
  select:focus, input:focus, textarea:focus { outline: 2px solid var(--accent-dim); border-color: var(--accent); }
  textarea { width: 100%; resize: vertical; line-height: 1.55; }

  button {
    font-family: var(--font); font-size: 14px; cursor: pointer;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border-strong); border-radius: 6px;
    padding: 7px 13px; transition: background .12s, border-color .12s;
  }
  button:hover { background: #262b35; border-color: #4a5263; }
  button:active { transform: scale(.98); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #08111d; font-weight: 600; }
  button.primary:hover { background: #6aaefb; }
  button.ghost { background: none; border: none; color: var(--text-dim); padding: 4px 6px; }
  button.ghost:hover { background: none; color: var(--text); }
  button.add-btn { display: inline-flex; align-items: center; gap: 6px; }

  /* ---- pillar group ---- */
  .pillar { margin-bottom: 26px; }
  .pillar-head {
    display: flex; align-items: center; gap: 9px; cursor: pointer;
    padding: 4px 0; margin-bottom: 10px; user-select: none;
  }
  .pillar-head h2 { font-size: 16px; font-weight: 600; margin: 0; }
  .pillar-head .chev { color: var(--text-dim); transition: transform .15s; font-size: 13px; width: 14px; }
  .pillar.collapsed .chev { transform: rotate(-90deg); }
  .pillar-head .count { font-size: 12px; color: var(--text-faint); }
  .pillar.collapsed .cards { display: none; }
  .cards { display: flex; flex-direction: column; gap: 10px; }

  /* ---- card ---- */
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px;
  }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .card-title { font-weight: 600; font-size: 15px; }
  .tags { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
  .tag { font-size: 11px; padding: 2px 9px; border-radius: 20px; white-space: nowrap; }
  .tag.confirmed { background: var(--green-bg); color: var(--green); }
  .tag.pending { background: var(--amber-bg); color: var(--amber); }
  .tag.scope { background: var(--panel-2); color: var(--text-dim); border: 1px solid var(--border); }

  .card-body { font-size: 13.5px; color: var(--text-dim); line-height: 1.6; margin-top: 7px; white-space: pre-wrap; }
  .card-body.clamped { display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
  .card-body.empty { font-style: italic; color: var(--text-faint); }
  .showmore { background: none; border: none; color: var(--accent); font-size: 12.5px; padding: 4px 0 0; }
  .showmore:hover { background: none; text-decoration: underline; }

  .card-actions { display: flex; gap: 12px; margin-top: 11px; }
  .card-actions button { font-size: 12.5px; display: inline-flex; align-items: center; gap: 5px; }

  /* ---- edit form ---- */
  .card.editing { border: 1px solid var(--accent); }
  .edit-banner { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--accent); margin-bottom: 12px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .field input, .field textarea { width: 100%; }
  .field-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .field-row .field { flex: 1; min-width: 130px; }
  .edit-buttons { display: flex; gap: 8px; margin-top: 4px; }
  .hint { color: var(--text-faint); font-weight: 400; }

  /* ---- states ---- */
  .state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .state.error { color: #f0907a; }
  svg.ic { width: 15px; height: 15px; vertical-align: -2px; }
</style>
</head>
<body>
<!--
  Córtex nav: include the shared shell the same way your other pages do, e.g.
  <script src="/cortex-shell.js"></script>
  (left out here so this file is self-contained; drop your standard include in.)
-->
<div class="wrap">

  <div class="page-head">
    <h1>Strategy</h1>
  </div>
  <p class="subtitle">Our paid-media positions. Confirmed = settled; pending = still being worked out.</p>

  <div class="toolbar">
    <div class="toolbar-group">
      <label for="editor">Editing as</label>
      <select id="editor">
        <option value="">— pick —</option>
        <option>Nate</option>
        <option>Juanes</option>
        <option>Martín</option>
      </select>
    </div>
    <div class="toolbar-group">
      <select id="filter-scope">
        <option value="">All clients</option>
        <option value="general">General</option>
        <option value="odc">ODC</option>
      </select>
      <select id="filter-status">
        <option value="">All statuses</option>
        <option value="confirmed">Confirmed</option>
        <option value="pending">Pending</option>
      </select>
      <button class="add-btn" id="add-card">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        New card
      </button>
    </div>
  </div>

  <div id="content"><div class="state">Loading strategy…</div></div>

</div>

<script>
const API = '/api/strategy';
const STATUS = ['confirmed', 'pending'];
const SCOPE = ['general', 'odc'];

let cards = [];          // current cards from server
let editingId = null;    // card_id being edited, or '__new__'
const expanded = new Set();   // card_ids whose body is un-clamped

// ---- editor name, remembered locally ----
const editorSel = document.getElementById('editor');
editorSel.value = localStorage.getItem('cortex_strategy_editor') || '';
editorSel.addEventListener('change', () => {
  localStorage.setItem('cortex_strategy_editor', editorSel.value);
});

// ---- filters ----
document.getElementById('filter-scope').addEventListener('change', render);
document.getElementById('filter-status').addEventListener('change', render);
document.getElementById('add-card').addEventListener('click', startNewCard);

function esc(s) {
  return (s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

async function load() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    cards = data.cards || [];
    render();
  } catch (err) {
    document.getElementById('content').innerHTML =
      '<div class="state error">Couldn\u2019t load strategy. ' + esc(String(err)) + '</div>';
  }
}

function render() {
  const scopeF = document.getElementById('filter-scope').value;
  const statusF = document.getElementById('filter-status').value;
  const root = document.getElementById('content');

  if (editingId === '__new__') { root.innerHTML = ''; root.appendChild(newCardForm()); return; }

  let list = cards.filter(c =>
    (!scopeF || c.applies_to === scopeF) && (!statusF || c.status === statusF));

  if (!list.length) {
    root.innerHTML = '<div class="state">No cards match these filters.</div>';
    return;
  }

  // group by pillar, preserve server order (already sorted by pillar)
  const groups = {};
  for (const c of list) (groups[c.pillar] ||= []).push(c);

  root.innerHTML = '';
  for (const pillar of Object.keys(groups)) {
    const g = document.createElement('div');
    g.className = 'pillar';
    const head = document.createElement('div');
    head.className = 'pillar-head';
    head.innerHTML =
      '<span class="chev">\u25BC</span>' +
      '<h2>' + esc(pillar) + '</h2>' +
      '<span class="count">' + groups[pillar].length + ' card' + (groups[pillar].length>1?'s':'') + '</span>';
    head.addEventListener('click', () => g.classList.toggle('collapsed'));
    g.appendChild(head);

    const cardsWrap = document.createElement('div');
    cardsWrap.className = 'cards';
    for (const c of groups[pillar]) {
      cardsWrap.appendChild(c.card_id === editingId ? editForm(c) : cardView(c));
    }
    g.appendChild(cardsWrap);
    root.appendChild(g);
  }
}

function cardView(c) {
  const el = document.createElement('div');
  el.className = 'card';
  const isExpanded = expanded.has(c.card_id);
  const hasBody = c.body && c.body.trim().length;

  el.innerHTML =
    '<div class="card-top">' +
      '<div class="card-title">' + esc(c.title) + '</div>' +
      '<div class="tags">' +
        '<span class="tag ' + c.status + '">' + esc(c.status) + '</span>' +
        '<span class="tag scope">' + esc(c.applies_to) + '</span>' +
      '</div>' +
    '</div>' +
    (hasBody
      ? '<div class="card-body' + (isExpanded ? '' : ' clamped') + '">' + esc(c.body) + '</div>'
      : '<div class="card-body empty">No position written yet.</div>');

  // show more / less (only if body might overflow 5 lines — we offer it whenever there's body)
  if (hasBody) {
    const body = el.querySelector('.card-body');
    // defer overflow check until in DOM
    setTimeout(() => {
      if (isExpanded || body.scrollHeight > body.clientHeight + 2) {
        const more = document.createElement('button');
        more.className = 'showmore';
        more.textContent = isExpanded ? 'Show less' : 'Show more';
        more.addEventListener('click', () => {
          if (expanded.has(c.card_id)) expanded.delete(c.card_id); else expanded.add(c.card_id);
          render();
        });
        body.after(more);
      }
    }, 0);
  }

  const actions = document.createElement('div');
  actions.className = 'card-actions';
  const editBtn = document.createElement('button');
  editBtn.className = 'ghost';
  editBtn.innerHTML = '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4v16h16v-7M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg> Edit';
  editBtn.addEventListener('click', () => { editingId = c.card_id; render(); });
  actions.appendChild(editBtn);
  el.appendChild(actions);
  return el;
}

function editForm(c) {
  const el = document.createElement('div');
  el.className = 'card editing';
  el.innerHTML = formInner(c, false);
  wireForm(el, c, false);
  return el;
}

function newCardForm() {
  const blank = { card_id: '', pillar: '', topic: '', title: '', body: '', status: 'pending', applies_to: 'odc' };
  const el = document.createElement('div');
  el.className = 'card editing';
  el.style.marginTop = '4px';
  el.innerHTML = formInner(blank, true);
  wireForm(el, blank, true);
  return el;
}

function formInner(c, isNew) {
  const statusOpts = STATUS.map(s => '<option' + (s===c.status?' selected':'') + '>' + s + '</option>').join('');
  const scopeOpts = SCOPE.map(s => '<option' + (s===c.applies_to?' selected':'') + '>' + s + '</option>').join('');
  return (
    '<div class="edit-banner">' +
      '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>' +
      (isNew ? 'New card — saving adds it to the strategy' : 'Editing — saving creates a new version') +
    '</div>' +
    (isNew
      ? '<div class="field"><label>Pillar</label><input class="f-pillar" placeholder="e.g. Keyword strategy" value="' + esc(c.pillar) + '"></div>'
      : '') +
    '<div class="field"><label>Title</label><input class="f-title" value="' + esc(c.title) + '"></div>' +
    '<div class="field"><label>Position <span class="hint">(the body)</span></label>' +
      '<textarea class="f-body" rows="5">' + esc(c.body) + '</textarea></div>' +
    '<div class="field-row">' +
      '<div class="field"><label>Status</label><select class="f-status">' + statusOpts + '</select></div>' +
      '<div class="field"><label>Applies to</label><select class="f-scope">' + scopeOpts + '</select></div>' +
    '</div>' +
    '<div class="field"><label>Why this change <span class="hint">(optional)</span></label>' +
      '<input class="f-note" placeholder="e.g. documented the anchor set"></div>' +
    '<div class="edit-buttons">' +
      '<button class="primary f-save">' + (isNew ? 'Add card' : 'Save new version') + '</button>' +
      '<button class="f-cancel">Cancel</button>' +
    '</div>'
  );
}

function slugify(pillar, title) {
  const p = (pillar.split(/\s+/)[0] || 'card').toLowerCase().replace(/[^a-z0-9]/g, '');
  const t = title.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40);
  return (p || 'card') + '.' + (t || Date.now());
}

function wireForm(el, c, isNew) {
  el.querySelector('.f-cancel').addEventListener('click', () => { editingId = null; render(); });
  el.querySelector('.f-save').addEventListener('click', async () => {
    const editor = editorSel.value;
    if (!editor) { editorSel.focus(); alert('Pick who you are (top left) before saving.'); return; }

    const title = el.querySelector('.f-title').value.trim();
    const pillar = isNew ? el.querySelector('.f-pillar').value.trim() : c.pillar;
    if (!title) { alert('Title is required.'); return; }
    if (isNew && !pillar) { alert('Pillar is required for a new card.'); return; }

    const payload = {
      card_id: isNew ? slugify(pillar, title) : c.card_id,
      pillar,
      topic: c.topic ?? null,
      title,
      body: el.querySelector('.f-body').value,
      status: el.querySelector('.f-status').value,
      applies_to: el.querySelector('.f-scope').value,
      change_kind: 'edit',
      note: el.querySelector('.f-note').value.trim() || null,
      edited_by: editor
    };

    const saveBtn = el.querySelector('.f-save');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      editingId = null;
      await load();   // refresh from server so the new version shows
    } catch (err) {
      saveBtn.disabled = false; saveBtn.textContent = isNew ? 'Add card' : 'Save new version';
      alert('Save failed: ' + err);
    }
  });
}

function startNewCard() {
  editingId = '__new__';
  render();
}

load();
</script>
</body>
</html>
