<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2236"/>
      <stop offset="1" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <!-- neural node motif: center node connected to 4 satellites -->
  <g stroke="#4285F4" stroke-width="26" stroke-linecap="round">
    <line x1="256" y1="256" x2="150" y2="150"/>
    <line x1="256" y1="256" x2="362" y2="150"/>
    <line x1="256" y1="256" x2="150" y2="362"/>
    <line x1="256" y1="256" x2="362" y2="362"/>
  </g>
  <circle cx="256" cy="256" r="62" fill="#64b5f6"/>
  <circle cx="150" cy="150" r="40" fill="#4285F4"/>
  <circle cx="362" cy="150" r="40" fill="#4285F4"/>
  <circle cx="150" cy="362" r="40" fill="#4285F4"/>
  <circle cx="362" cy="362" r="40" fill="#4285F4"/>
</svg>
