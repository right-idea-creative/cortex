<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5B8"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
  </defs>

  <!-- Background circle (para que se vea bien en cualquier fondo de pestaña) -->
  <circle cx="32" cy="32" r="30" fill="#0A0A0F" stroke="#00D4AA" stroke-width="1.5"/>

  <!-- Simplified "C" formed by terminal prompt -->
  <!-- Outer arc -->
  <path d="M 32 12 
           A 20 20 0 1 0 32 52
           L 32 44
           A 12 12 0 1 1 32 20
           Z" 
        fill="url(#favGrad)"/>

  <!-- Prompt angle (>) -->
  <path d="M 38 24 L 48 32 L 38 40" 
        fill="none" 
        stroke="#00D4AA" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <!-- Cursor dot (simplified from bar for tiny sizes) -->
  <circle cx="43" cy="48" r="3" fill="#00D4AA">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Center dot (the "core") -->
  <circle cx="32" cy="32" r="3" fill="#0A0A0F"/>
</svg>