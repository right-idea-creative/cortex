<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#050a05" />
<title>Roadmap — Córtex Account Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Special+Elite&display=swap" rel="stylesheet" />
<style>
  :root {
    --crt-bg: #050a05;
    --ph: #00ff41;
    --ph-dim: rgba(0, 255, 65, .5);
    --ph-faint: rgba(0, 255, 65, .22);
    --ph-ghost: rgba(0, 255, 65, .1);
    --amber: #ffb000;
    --amber-dim: rgba(255, 176, 0, .55);
    --red: #ff2b2b;
    --red-dim: rgba(255, 43, 43, .6);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--crt-bg); color: var(--ph);
    font-family: "VT323", monospace; min-height: 100vh;
  }
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 90;
    background: repeating-linear-gradient(to bottom,
      rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,255,65,.03) 3px, rgba(0,0,0,.12) 4px);
  }
  @keyframes tick { from{transform:translateX(0);} to{transform:translateX(-50%);} }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
  @keyframes blink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
  @media (prefers-reduced-motion: reduce) { .tick-track { animation: none !important; } }

  .wrap { max-width: 1180px; margin: 0 auto; padding: 1.1rem 1.2rem 3rem; }

  .head-line { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .8rem; flex-wrap: wrap; gap: .4rem; }
  .head-line h1 { font-family: inherit; font-weight: 400; font-size: 26px; margin: 0; letter-spacing: .1em; color: var(--ph); text-shadow: 0 0 8px rgba(0,255,65,.4); }
  .head-line .sub { font-size: 16px; color: var(--ph-faint); letter-spacing: .06em; }

  /* ticker */
  .ticker {
    overflow: hidden; white-space: nowrap;
    border-top: 1px solid var(--ph-faint); border-bottom: 1px solid var(--ph-faint);
    padding: 5px 0; margin-bottom: 1.1rem;
    -webkit-mask-image: linear-gradient(90deg,transparent,#000 3%,#000 97%,transparent);
    mask-image: linear-gradient(90deg,transparent,#000 3%,#000 97%,transparent);
  }
  .tick-track { display: inline-block; animation: tick 40s linear infinite; font-size: 16px; color: var(--ph-dim); letter-spacing: .05em; }
  .tick-track span { margin-right: 42px; }
  .tick-track .warn { color: var(--amber); } .tick-track .bad { color: var(--red); }

  /* filter strip */
  .filter-strip { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: .9rem; }
  .filt {
    background: transparent; border: 1px solid var(--ph-faint); color: var(--ph-dim);
    font-family: inherit; font-size: 15px; letter-spacing: .08em;
    padding: 5px 12px; cursor: pointer; transition: all .12s; white-space: nowrap;
  }
  .filt:hover { color: var(--ph); border-color: var(--ph-dim); }
  .filt.active { background: rgba(0,255,65,.14); color: var(--ph); border-color: var(--ph); text-shadow: 0 0 6px rgba(0,255,65,.5); }
  .filt .ct { margin-left: 7px; color: var(--ph-faint); }

  /* layout */
  .hero { display: grid; grid-template-columns: minmax(0,1fr) 300px; gap: 1.1rem; align-items: start; }

  /* task table */
  .tbl { border: 1px solid var(--ph-faint); padding: 10px 12px 14px; }
  .stage-hd {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-top: 14px; padding-bottom: 4px; border-bottom: 1px solid var(--ph-ghost);
    font-size: 16px; letter-spacing: .1em; color: var(--ph);
  }
  .stage-hd:first-child { margin-top: 0; }
  .stage-hd .s-meta { font-size: 13px; color: var(--ph-faint); letter-spacing: .04em; }

  .t-row {
    display: grid; grid-template-columns: 26px 1fr 74px 108px 60px;
    gap: 10px; align-items: baseline; padding: 4px 0;
    border-bottom: 1px solid var(--ph-ghost); cursor: pointer; font-size: 15px;
  }
  .t-row:hover { background: rgba(0,255,65,.05); }
  .t-row .box { color: var(--ph-dim); }
  .t-row.done .box { color: var(--ph); }
  .t-row .title { color: var(--ph-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .t-row:hover .title { color: var(--ph); }
  .t-row.done .title { color: var(--ph-faint); text-decoration: line-through; text-decoration-color: var(--ph-ghost); }
  .t-row.late .title, .t-row.late .box { color: var(--red); text-shadow: 0 0 5px rgba(255,43,43,.4); }
  .t-row .owner { font-size: 13px; letter-spacing: .06em; }
  .t-row .owner.nate { color: var(--ph); }
  .t-row .owner.sebas { color: var(--ph-dim); }
  .t-row .owner.both { color: var(--amber); }
  .t-row .dates { font-size: 13px; color: var(--ph-faint); white-space: nowrap; }
  .t-row.late .dates { color: var(--red-dim); }
  .t-row .flag { font-size: 12px; letter-spacing: .05em; text-align: right; }
  .t-row .flag.gate { color: var(--amber); }
  .t-row .flag.late-tag { color: var(--red); }

  /* right rail */
  .rail { display: flex; flex-direction: column; gap: 1.1rem; padding-top: 2px; }
  .panel { border: 1px solid var(--ph-faint); padding: 10px 11px 11px; }
  .panel h3 { font-family: inherit; font-weight: 400; font-size: 15px; margin: 0 0 8px; letter-spacing: .16em; color: var(--ph-dim); border-bottom: 1px solid var(--ph-ghost); padding-bottom: 5px; }
  .sig-row { display: flex; justify-content: space-between; align-items: center; font-size: 15px; padding: 3px 0; color: var(--ph-dim); letter-spacing: .04em; }
  .sig-row .v { color: var(--ph); }
  .sig-row .v.warn { color: var(--amber); } .sig-row .v.bad { color: var(--red); }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .dot.ok { background: var(--ph); box-shadow: 0 0 5px var(--ph); }
  .gate-row { padding: 5px 0; border-bottom: 1px solid var(--ph-ghost); cursor: pointer; }
  .gate-row:last-child { border-bottom: none; }
  .gate-row .g-t { font-size: 15px; color: var(--ph-dim); letter-spacing: .04em; display: flex; justify-content: space-between; gap: .5rem; }
  .gate-row:hover .g-t { color: var(--ph); }
  .gate-row .g-d { font-size: 13px; color: var(--ph-faint); }
  .gate-row .when { color: var(--amber); white-space: nowrap; } .gate-row .when.over { color: var(--red); }

  /* alert row */
  .alerts { display: grid; grid-template-columns: 1fr 1fr; gap: 1.1rem; margin-top: 1.3rem; }
  .alert { border: 1px solid; padding: 11px 13px 12px; }
  .alert h3 { font-family: inherit; font-weight: 400; font-size: 17px; margin: 0 0 8px; letter-spacing: .12em; display: flex; align-items: center; gap: 8px; }
  .alert.late { border-color: var(--red-dim); } .alert.late h3 { color: var(--red); }
  .alert.late h3 .lamp { width: 9px; height: 9px; border-radius: 50%; background: var(--red); animation: pulse 1.4s infinite; }
  .alert.flight { border-color: var(--amber-dim); } .alert.flight h3 { color: var(--amber); }
  .alert.flight h3 .lamp { width: 9px; height: 9px; border-radius: 50%; background: var(--amber); }
  .arow { font-size: 16px; padding: 3px 0; letter-spacing: .04em; display: flex; justify-content: space-between; gap: .6rem; cursor: pointer; }
  .alert.late .arow { color: rgba(255,120,120,.9); } .alert.late .arow .sub { color: var(--red-dim); }
  .alert.flight .arow { color: rgba(255,206,120,.95); } .alert.flight .arow .sub { color: var(--amber-dim); }
  .arow:hover { text-shadow: 0 0 6px currentColor; }
  .empty { font-size: 15px; color: var(--ph-faint); letter-spacing: .04em; }
  .alist { max-height: 120px; overflow-y: auto; padding-right: 4px; }
  .alist::-webkit-scrollbar { width: 5px; } .alist::-webkit-scrollbar-thumb { background: var(--ph-faint); }

  /* legend */
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: .7rem; font-size: 14px; color: var(--ph-faint); letter-spacing: .04em; align-items: center; }
  .legend .k { display: flex; align-items: center; gap: 6px; }

  /* terminal (agent placeholder) */
  .term { margin-top: 1.3rem; border: 1px solid var(--ph-dim); background: #030703; }
  .term-bar { background: rgba(0,255,65,.08); border-bottom: 1px solid var(--ph-faint); padding: 4px 11px; font-size: 14px; color: var(--ph-dim); letter-spacing: .1em; display: flex; justify-content: space-between; }
  .term-scroll { height: 150px; overflow-y: auto; padding: 10px 13px; font-size: 16px; line-height: 1.32; }
  .term-scroll::-webkit-scrollbar { width: 6px; } .term-scroll::-webkit-scrollbar-thumb { background: var(--ph-faint); }
  .t-line { margin: 1px 0; letter-spacing: .03em; white-space: pre-wrap; word-break: break-word; }
  .t-user { color: var(--ph); } .t-user::before { content: "C:\\CORTEX> "; color: var(--ph-dim); }
  .t-agent { color: var(--ph-dim); } .t-sys { color: var(--ph-faint); } .t-err { color: var(--red-dim); }
  .quicks { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 11px; border-top: 1px solid var(--ph-ghost); }
  .qbtn { background: transparent; border: 1px solid var(--ph-faint); color: var(--ph-dim); font-family: inherit; font-size: 14px; letter-spacing: .05em; padding: 3px 9px; cursor: pointer; }
  .qbtn:hover { background: rgba(0,255,65,.12); color: var(--ph); }
  .term-input-row { display: flex; align-items: center; padding: 7px 11px; border-top: 1px solid var(--ph-faint); }
  .term-input-row .pr { color: var(--ph-dim); font-size: 16px; margin-right: 7px; white-space: nowrap; }
  .term-input { flex: 1; background: transparent; border: none; outline: none; color: var(--ph); font-family: inherit; font-size: 16px; letter-spacing: .04em; }
  .caret { display: inline-block; width: 9px; height: 17px; background: var(--ph); animation: blink 1.1s steps(1) infinite; vertical-align: middle; }

  @media (max-width: 860px) {
    .hero { grid-template-columns: 1fr; }
    .rail { flex-direction: row; flex-wrap: wrap; } .rail .panel { flex: 1 1 240px; }
    .alerts { grid-template-columns: 1fr; }
    .t-row { grid-template-columns: 20px 1fr 56px; }
    .t-row .dates, .t-row .flag { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="head-line">
    <h1>CÓRTEX ACCOUNT INTELLIGENCE</h1>
    <span class="sub" id="head-sub">build roadmap · read-only</span>
  </div>

  <div class="ticker"><div class="tick-track" id="tick"></div></div>

  <div class="filter-strip" id="filters"></div>

  <div class="hero">
    <div>
      <div class="tbl" id="tbl"></div>
      <div class="legend">
        <span class="k" style="color:var(--ph)">■ Nate</span>
        <span class="k" style="color:var(--ph-dim)">□ Sebas</span>
        <span class="k" style="color:var(--amber)">■ Both</span>
        <span class="k" style="color:var(--red)">■ Late</span>
      </div>
    </div>

    <div class="rail">
      <div class="panel">
        <h3>SIGNAL</h3>
        <div class="sig-row"><span><span class="dot ok"></span>NEON</span><span class="v">live</span></div>
        <div class="sig-row"><span>TASKS</span><span class="v" id="sig-total">—</span></div>
        <div class="sig-row"><span>DONE</span><span class="v" id="sig-done">—</span></div>
        <div class="sig-row"><span>IN FLIGHT</span><span class="v" id="sig-flight">—</span></div>
        <div class="sig-row"><span>LATE</span><span class="v" id="sig-late">—</span></div>
      </div>
      <div class="panel">
        <h3>DEADLINE GATES</h3>
        <div id="gates"></div>
      </div>
    </div>
  </div>

  <div class="alerts">
    <div class="alert late">
      <h3><span class="lamp"></span> LATE</h3>
      <div class="alist" id="late-list"></div>
    </div>
    <div class="alert flight">
      <h3><span class="lamp"></span> NEXT UP</h3>
      <div class="alist" id="next-list"></div>
    </div>
  </div>

  <!-- AGENT TERMINAL — placeholder shell. Wire /api/roadmap-agent here later. -->
  <div class="term">
    <div class="term-bar"><span>AGENT TERMINAL</span><span id="term-status">OFFLINE</span></div>
    <div class="term-scroll" id="term-scroll"></div>
    <div class="quicks">
      <button class="qbtn" data-cmd="/brief">/brief</button>
      <button class="qbtn" data-cmd="/late">/late</button>
      <button class="qbtn" data-cmd="/next">/next</button>
      <button class="qbtn" data-cmd="/gates">/gates</button>
    </div>
    <div class="term-input-row">
      <span class="pr">C:\CORTEX></span>
      <input class="term-input" id="term-input" autocomplete="off" spellcheck="false" placeholder="agent not yet connected — click a task to inspect it" />
      <span class="caret"></span>
    </div>
  </div>
</div>

<script>
var state = { data: null, filter: "ALL" };
var OWNERS = ["ALL", "NATE", "SEBAS", "BOTH"];
var STAGE_NAMES = {
  s0_verification:     "STAGE 0 · VERIFICATION",
  s1_spine_verdicts:   "STAGE 1 · SPINE + VERDICTS",
  s2_agent_review:     "STAGE 2 · AGENT + REVIEW",
  s3_board_loop:       "STAGE 3 · BOARD + LOOP",
  s4_trackb_secondary: "STAGE 4 · TRACK B + SECONDARY",
};

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function d(s){
  var m = String(s).match(/^(\d{4}-\d{2}-\d{2})/);
  return m ? new Date(m[1] + "T00:00:00") : new Date(NaN);
}
function daysBetween(a,b){ return Math.round((d(b)-d(a))/86400000); }
function todayStr(){ var t=new Date(); return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0"); }
function md(s){ var x=d(s); if (isNaN(x)) return "—"; return (x.getMonth()+1)+"/"+x.getDate(); }
function ownerClass(o){ return o==="nate"?"nate":o==="sebas"?"sebas":"both"; }
function ownerLabel(o){ return o==="nate"?"NATE":o==="sebas"?"SEBAS":"BOTH"; }
function statBox(st){ return st==="done"?"[x]":st==="in_progress"?"[~]":st==="blocked"?"[!]":st==="dropped"?"[-]":"[ ]"; }

async function loadRoadmap(){
  try {
    var res = await fetch("/api/roadmap", { headers:{ "Accept":"application/json" }});
    var j = await res.json();
    if (!res.ok || j.error) { termLine("t-err","// roadmap load failed: " + (j.error||res.status)); return; }
    state.data = j;
    render();
  } catch(e){ termLine("t-err","// roadmap unreachable: " + e.message); }
}

function isLate(t){
  if (t.status==="done" || t.status==="dropped") return false;
  return daysBetween(todayStr(), t.planned_end) < 0;
}
function visible(){
  if (!state.data) return [];
  return state.data.tasks.filter(function(t){
    if (state.filter==="ALL") return true;
    return t.owner === state.filter.toLowerCase();
  });
}

function render(){ renderHead(); renderTicker(); renderFilters(); renderTable(); renderSignal(); renderGates(); renderAlerts(); }

function renderHead(){
  document.getElementById("head-sub").textContent =
    "build roadmap · starts " + md(state.data.project_start) + " · read-only";
}

function gateList(){ return state.data.tasks.filter(function(t){ return t.is_gate; })
  .sort(function(a,b){ return d(a.planned_start)-d(b.planned_start); }); }

function nextUp(){
  var t = todayStr();
  return state.data.tasks.filter(function(x){
    return x.status!=="done" && x.status!=="dropped" && daysBetween(t, x.planned_start) >= 0;
  }).sort(function(a,b){ return d(a.planned_start)-d(b.planned_start); });
}

function renderTicker(){
  var j = state.data, c = j.counts, parts = [];
  parts.push(c.total + " ON ROADMAP");
  parts.push(c.done + " DONE");
  if (c.in_progress) parts.push('<span class="warn">' + c.in_progress + " IN FLIGHT</span>");
  if (c.late) parts.push('<span class="bad">' + c.late + " LATE</span>");
  var g = gateList()[0];
  if (g) {
    var dd = daysBetween(todayStr(), g.planned_start);
    var w = dd<0 ? Math.abs(dd)+"D OVERDUE" : dd===0 ? "TODAY" : "IN "+dd+"D";
    parts.push('NEXT GATE <span class="warn">' + esc(g.title.toUpperCase()) + " · " + w + "</span>");
  }
  nextUp().slice(0,5).forEach(function(t){
    parts.push('<span style="color:var(--ph-dim)">↗</span> ' + esc(t.title.toUpperCase()));
  });
  var track = parts.join('<span style="opacity:.3">&nbsp;&nbsp;•&nbsp;&nbsp;</span>');
  document.getElementById("tick").innerHTML = "<span>"+track+"</span><span>"+track+"</span>";
}

function renderFilters(){
  var el = document.getElementById("filters");
  var all = state.data.tasks;
  var counts = { NATE: 0, SEBAS: 0, BOTH: 0 };
  all.forEach(function(t){ counts[ownerLabel(t.owner)]++; });
  el.innerHTML = OWNERS.map(function(o){
    var n = o==="ALL" ? all.length : counts[o];
    return '<button class="filt'+(state.filter===o?" active":"")+'" data-o="'+o+'">'+o+'<span class="ct">'+n+'</span></button>';
  }).join("");
  Array.prototype.forEach.call(el.querySelectorAll(".filt"), function(b){
    b.addEventListener("click", function(){ state.filter=b.getAttribute("data-o"); renderFilters(); renderTable(); });
  });
}

function renderTable(){
  var vis = visible();
  var byStage = {};
  vis.forEach(function(t){ (byStage[t.stage]=byStage[t.stage]||[]).push(t); });
  var order = state.data.stages.map(function(s){ return s.stage; });

  var html = "";
  order.forEach(function(stg){
    var list = byStage[stg]; if (!list || !list.length) return;
    var doneCt = list.filter(function(t){ return t.status==="done"; }).length;
    html += '<div class="stage-hd"><span>'+esc(STAGE_NAMES[stg]||stg)+'</span>' +
            '<span class="s-meta">'+doneCt+'/'+list.length+' done</span></div>';
    list.forEach(function(t){
      var late = isLate(t);
      var rowCls = "t-row" + (t.status==="done"?" done":"") + (late?" late":"");
      var flag = late ? '<span class="flag late-tag">LATE</span>'
        : t.is_gate ? '<span class="flag gate">GATE</span>'
        : '<span class="flag"></span>';
      var dates = t.status==="done" ? "done" : (md(t.planned_start)+"–"+md(t.planned_end));
      html += '<div class="'+rowCls+'" data-id="'+esc(t.task_id)+'">' +
        '<span class="box">'+statBox(t.status)+'</span>' +
        '<span class="title" title="'+esc(t.title)+'">'+esc(t.title)+'</span>' +
        '<span class="owner '+ownerClass(t.owner)+'">'+ownerLabel(t.owner)+'</span>' +
        '<span class="dates">'+dates+'</span>' +
        flag +
        '</div>';
    });
  });
  document.getElementById("tbl").innerHTML = html || '<div class="empty" style="padding:12px">// nothing matches filter</div>';

  Array.prototype.forEach.call(document.querySelectorAll(".t-row"), function(el){
    el.addEventListener("click", function(){ inspect(el.getAttribute("data-id")); });
  });
}

function renderSignal(){
  var c = state.data.counts;
  document.getElementById("sig-total").textContent = c.total;
  document.getElementById("sig-done").textContent = c.done;
  var f = document.getElementById("sig-flight"); f.textContent = c.in_progress; f.className = "v" + (c.in_progress?" warn":"");
  var l = document.getElementById("sig-late"); l.textContent = c.late; l.className = "v" + (c.late?" bad":"");
}

function renderGates(){
  var el = document.getElementById("gates");
  var gs = gateList();
  el.innerHTML = gs.map(function(g){
    var dd = daysBetween(todayStr(), g.planned_start);
    var over = dd<0;
    var w = over ? Math.abs(dd)+"d overdue" : dd===0 ? "today" : "in "+dd+"d";
    if (g.status==="done") w = "done";
    return '<div class="gate-row" data-id="'+esc(g.task_id)+'">'+
      '<div class="g-t"><span>'+esc(g.title)+'</span><span class="when'+(over?" over":"")+'">'+w+'</span></div>'+
      '<div class="g-d">'+md(g.planned_start)+'</div></div>';
  }).join("") || '<div class="empty">// no gates found</div>';
  Array.prototype.forEach.call(el.querySelectorAll(".gate-row"), function(r){
    r.addEventListener("click", function(){ inspect(r.getAttribute("data-id")); });
  });
}

function renderAlerts(){
  var late = state.data.tasks.filter(isLate).sort(function(a,b){ return d(a.planned_end)-d(b.planned_end); });
  var ll = document.getElementById("late-list");
  ll.innerHTML = late.length ? late.map(function(t){
    var od = Math.abs(daysBetween(todayStr(), t.planned_end));
    return '<div class="arow" data-id="'+esc(t.task_id)+'"><span>'+esc(t.title)+'</span><span class="sub">'+od+'d</span></div>';
  }).join("") : '<div class="empty">// nothing late</div>';

  var nx = nextUp().slice(0,8);
  var nl = document.getElementById("next-list");
  nl.innerHTML = nx.length ? nx.map(function(t){
    var dd = daysBetween(todayStr(), t.planned_start);
    var w = dd===0?"today":dd+"d";
    return '<div class="arow" data-id="'+esc(t.task_id)+'"><span>'+esc(t.title)+'</span><span class="sub">'+w+'</span></div>';
  }).join("") : '<div class="empty">// clear ahead</div>';

  Array.prototype.forEach.call(document.querySelectorAll(".arow"), function(r){
    r.addEventListener("click", function(){ inspect(r.getAttribute("data-id")); });
  });
}

// clicking any task echoes its detail into the terminal — the slot the agent
// will eventually replace with real Q&A.
function inspect(id){
  var t = state.data.tasks.find(function(x){ return x.task_id===id; });
  if (!t) return;
  var late = isLate(t);
  var when = late ? (Math.abs(daysBetween(todayStr(),t.planned_end))+"d overdue")
    : (t.status==="done" ? "done" : (md(t.planned_start)+" – "+md(t.planned_end)));
  termLine("t-user", "inspect " + id);
  termLine("t-agent", t.task_id + " · " + t.title);
  termLine("t-sys", ownerLabel(t.owner) + " · " + t.work_type + " · " + when + " · status: " + t.status +
    (t.depends_on && t.depends_on.length ? " · needs: " + t.depends_on.join(", ") : ""));
  if (t.detail) termLine("t-sys", t.detail);
}

function termLine(cls, text){
  var s = document.getElementById("term-scroll");
  var div = document.createElement("div");
  div.className = "t-line " + cls; div.textContent = text;
  s.appendChild(div); s.scrollTop = s.scrollHeight;
}

document.getElementById("term-input").addEventListener("keydown", function(e){
  if (e.key==="Enter"){ var v=this.value.trim(); this.value=""; if(!v) return;
    termLine("t-user", v);
    termLine("t-sys", "// agent offline — not yet connected. Click a task in the list to inspect it.");
  }
});
Array.prototype.forEach.call(document.querySelectorAll(".qbtn"), function(b){
  b.addEventListener("click", function(){
    termLine("t-user", b.getAttribute("data-cmd"));
    termLine("t-sys", "// agent offline — commands not wired yet.");
  });
});

termLine("t-sys", "CÓRTEX ROADMAP TERMINAL — read-only view. Agent slot reserved; click any task to inspect.");
loadRoadmap();
setInterval(loadRoadmap, 60000);
</script>
</body>
